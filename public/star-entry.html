<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>별 포스트카드 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #0d0b1f 0%, #141030 55%, #0b1b38 100%);
      min-height: 100vh; min-height: 100dvh;
      color: #fff;
      padding: 24px 20px max(env(safe-area-inset-bottom), 28px);
    }

    .wrap { max-width: 440px; margin: 0 auto; }

    /* ── Brand ── */
    .brand {
      text-align: center;
      font-size: 11px; letter-spacing: .14em;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      padding: 4px 0 28px;
    }

    /* ── 감정 선택 ── */
    .q-label {
      font-size: 19px; font-weight: 700;
      line-height: 1.45; margin-bottom: 18px;
      letter-spacing: -.02em;
    }
    .emotion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 32px;
    }
    .emotion-btn {
      background: rgba(255,255,255,0.055);
      border: 1.5px solid rgba(255,255,255,0.11);
      border-radius: 18px;
      padding: 22px 14px 18px;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: center;
      transition: background .16s, border-color .16s, box-shadow .16s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .emotion-btn:active { transform: scale(.97); }
    .emotion-btn.selected {
      background: rgba(140,180,255,0.16);
      border-color: #7ab0ff;
      box-shadow: 0 0 20px rgba(120,170,255,0.16);
    }
    .e-icon { font-size: 30px; display: block; margin-bottom: 8px; }
    .e-text { font-size: 15px; font-weight: 600; display: block; }

    /* ── 소원 입력 ── */
    .wish-label {
      font-size: 14px; color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }
    .wish-box {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.11);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 28px;
      transition: border-color .16s;
    }
    .wish-box:focus-within {
      border-color: rgba(255,255,255,0.28);
    }
    .wish-box textarea {
      width: 100%; min-height: 96px;
      background: transparent; border: none; outline: none;
      color: #fff; font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7; padding: 16px; resize: none;
    }
    .wish-box textarea::placeholder { color: rgba(255,255,255,0.2); }
    .wish-count {
      text-align: right; font-size: 11px;
      color: rgba(255,255,255,0.22); padding: 0 14px 10px;
    }

    /* ── CTA ── */
    .btn-cta {
      width: 100%; padding: 19px;
      background: linear-gradient(92deg, #4f8ef7 0%, #7b5ea7 100%);
      border: none; border-radius: 16px;
      color: #fff; font-size: 17px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity .18s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-cta:disabled { opacity: .28; cursor: not-allowed; }
    .btn-cta:not(:disabled):active { transform: scale(.98); opacity: .92; }

    .error-msg {
      font-size: 13px; color: #ff9a9a;
      text-align: center; min-height: 18px;
    }

    /* ── 생성 오버레이 ── */
    .overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(9, 7, 22, 0.93);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }
    .overlay.hidden { display: none; }
    .ov-star {
      font-size: 56px;
      animation: glow 1.8s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { opacity: .7; transform: scale(1); filter: drop-shadow(0 0 8px rgba(255,220,80,.3)); }
      50%      { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 22px rgba(255,220,80,.8)); }
    }
    .ov-text { font-size: 15px; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="brand">Daily Miracles · 여수 케이블카</div>

    <!-- ① 감정 -->
    <div class="q-label">지금 이 순간,<br>어떤 마음인가요?</div>
    <div class="emotion-grid">
      <button class="emotion-btn" data-emotion="숨이 놓였어요" data-gem="emerald">
        <span class="e-icon">🌙</span>
        <span class="e-text">숨이 놓였어요</span>
      </button>
      <button class="emotion-btn" data-emotion="믿고 싶어졌어요" data-gem="diamond">
        <span class="e-icon">🌟</span>
        <span class="e-text">믿고 싶어졌어요</span>
      </button>
      <button class="emotion-btn" data-emotion="정리됐어요" data-gem="sapphire">
        <span class="e-icon">🪐</span>
        <span class="e-text">정리됐어요</span>
      </button>
      <button class="emotion-btn" data-emotion="용기났어요" data-gem="citrine">
        <span class="e-icon">🌱</span>
        <span class="e-text">용기났어요</span>
      </button>
    </div>

    <!-- ② 소원 -->
    <div class="wish-label">지금 별에 담고 싶은 소원은요?</div>
    <div class="wish-box">
      <textarea id="wishInput" maxlength="100"
        placeholder="이 소원이 별이 됩니다..."></textarea>
      <div class="wish-count"><span id="wishCount">0</span>/100</div>
    </div>

    <!-- ③ CTA -->
    <button class="btn-cta" id="btnCreate" disabled>
      내 별 포스트카드 만들기 ✨
    </button>
    <div class="error-msg" id="errorMsg"></div>

  </div>

  <!-- 생성 중 오버레이 -->
  <div class="overlay hidden" id="overlay">
    <div class="ov-star">✨</div>
    <div class="ov-text">별이 만들어지고 있어요...</div>
  </div>

  <script>
    const FLOW_ASCEND = 8;
    const loc = new URLSearchParams(location.search).get('loc') || 'direct';

    // 역진입 차단
    if (Number(localStorage.getItem('flow_step') || 0) >= FLOW_ASCEND) {
      location.replace('/complete.html');
    }
    localStorage.setItem('flow_step', '1');

    window.addEventListener('popstate', () => {
      if (Number(localStorage.getItem('flow_step') || 0) >= FLOW_ASCEND)
        location.replace('/complete.html');
    });

    // 3개월 재방문 감지
    const _ek = localStorage.getItem('access_key');
    if (_ek && loc !== 'direct') {
      fetch('/api/star/' + encodeURIComponent(_ek))
        .then(r => r.json())
        .then(d => {
          if (!d.success || !d.star) return;
          const months = (Date.now() - new Date(d.star.created_at).getTime())
                         / (1000 * 60 * 60 * 24 * 30.44);
          if (months >= 3)
            location.href = '/star-unlock.html?key=' + encodeURIComponent(_ek)
                            + '&loc=' + encodeURIComponent(loc);
        }).catch(() => {});
    }

    let selectedEmotion = null;
    let selectedGem     = null;
    let wishText        = '';

    const btnCreate = document.getElementById('btnCreate');
    const errorMsg  = document.getElementById('errorMsg');
    const overlay   = document.getElementById('overlay');

    function refreshCTA() {
      btnCreate.disabled = !(selectedEmotion && wishText.trim().length > 0);
    }

    // 감정 선택
    document.querySelectorAll('.emotion-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.emotion-btn')
          .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedEmotion = btn.dataset.emotion;
        selectedGem     = btn.dataset.gem;
        refreshCTA();
      });
    });

    // 소원 입력
    const wishInput = document.getElementById('wishInput');
    const wishCount = document.getElementById('wishCount');
    wishInput.addEventListener('input', () => {
      wishText = wishInput.value;
      wishCount.textContent = wishText.length;
      refreshCTA();
    });

    // CTA
    btnCreate.addEventListener('click', async () => {
      if (!selectedEmotion || !wishText.trim()) return;

      btnCreate.disabled   = true;
      errorMsg.textContent = '';
      overlay.classList.remove('hidden');

      try {
        // 1. 이미지 생성
        const genRes  = await fetch('/api/star-image/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            emotion:  selectedEmotion,
            gem:      selectedGem,
            location: loc,
          }),
        });
        const genData = await genRes.json();
        if (!genData.success) throw new Error(genData.error || '이미지 생성 실패');

        // 2. 별 저장
        const commitRes  = await fetch('/api/star/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            emotion:           selectedEmotion,
            origin_location:   loc,
            preview_image_url: genData.image_url,
            wish_text:         wishText.trim(),
            gem_type:          selectedGem,
          }),
        });
        const commitData = await commitRes.json();
        if (!commitData.success) throw new Error(commitData.error || '별 저장 실패');

        // 3. 저장 → complete.html
        localStorage.setItem('access_key',      commitData.access_key);
        localStorage.setItem('star_id',         commitData.star_id || '');
        localStorage.setItem('emotion_linked',  commitData.emotion_link?.linked ? '1' : '0');
        localStorage.setItem('share_image_url', genData.image_url || '');
        localStorage.setItem('origin_location', loc);
        localStorage.setItem('flow_step',       String(FLOW_ASCEND));

        location.href = '/complete.html';

      } catch (err) {
        overlay.classList.add('hidden');
        btnCreate.disabled   = false;
        errorMsg.textContent = err.message || '잠시 후 다시 시도해주세요';
      }
    });
  </script>
</body>
</html>
