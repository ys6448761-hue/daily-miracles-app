<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>별 만들기 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .container { max-width: 480px; width: 100%; }

    /* ── Panel system ──────────────────────────────────────── */
    .panel { display: block; }
    .panel.hidden { display: none; }

    /* ── Panel 1: Emotion Selection ───────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .star-icon { font-size: 56px; margin-bottom: 16px; display: block; }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.5;
    }
    .header p {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }

    .emotion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }
    .emotion-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .emotion-btn:hover { background: rgba(255,255,255,0.15); }
    .emotion-btn.selected {
      background: rgba(100,160,255,0.3);
      border-color: #64a0ff;
      box-shadow: 0 0 16px rgba(100,160,255,0.25);
    }
    .emotion-emoji { font-size: 28px; display: block; margin-bottom: 6px; }

    .btn-next {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-next.active { opacity: 1; pointer-events: auto; }

    /* ── Panel 2: Preview ─────────────────────────────────── */
    .preview-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .preview-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    .preview-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .img-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.04) 0%,
        rgba(255,255,255,0.1) 50%,
        rgba(255,255,255,0.04) 100%
      );
      background-size: 200% 200%;
      animation: shimmer 1.8s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .img-skeleton.hidden { display: none; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-star {
      font-size: 44px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .skeleton-hint {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.75; }
    }

    #previewImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #previewImg.ready { display: block; }

    .emotion-text-label {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #a8c8ff;
      margin-bottom: 8px;
      min-height: 26px;
    }
    .loading-hint {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.32);
      margin-bottom: 20px;
    }
    .loading-hint.hidden { display: none; }

    .btn-commit {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-commit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-back {
      width: 100%;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      padding: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .btn-back:hover { color: rgba(255,255,255,0.65); }

    .error-msg {
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(255,80,80,0.2);
      border-radius: 10px;
      font-size: 13px;
      color: #ff9999;
      text-align: center;
      display: none;
    }

    /* ── Panel 0: 공유 유입 인트로 ─────────────────────── */
    .intro-star-wrap {
      width: 100%; max-width: 260px;
      margin: 0 auto 24px;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.05);
    }
    .intro-star-img {
      width: 100%; height: 100%;
      object-fit: cover; display: none;
    }
    .intro-star-img.ready { display: block; }
    .intro-skeleton {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px; opacity: 0.35;
      animation: pulse 2s ease-in-out infinite;
    }
    .intro-message {
      text-align: center;
      font-size: 19px; font-weight: 700;
      line-height: 1.65; margin-bottom: 10px;
      color: rgba(255,255,255,0.92);
    }
    .intro-sub {
      text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.42);
      margin-bottom: 36px; line-height: 1.6;
    }
    .btn-make-star {
      width: 100%; padding: 18px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none; border-radius: 14px;
      color: #fff; font-size: 17px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    .btn-make-star:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">

    <!-- ── Panel 0: 공유 유입 인트로 ─────────────────────────── -->
    <div class="panel hidden" id="panelIntro">
      <div style="text-align:center;margin-bottom:28px;">
        <span style="font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:.05em">✦ DAILY MIRACLES</span>
      </div>
      <div class="intro-star-wrap">
        <div class="intro-skeleton" id="introSkeleton">✨</div>
        <img class="intro-star-img" id="introStarImg" alt="누군가의 별">
      </div>
      <p class="intro-message">이건, 누군가의 소원이<br>만든 별이에요</p>
      <p class="intro-sub">지금 이 순간의 마음을<br>당신도 별로 남겨보세요</p>
      <button class="btn-make-star" id="btnMakeStar">나도 내 별 만들어보기 →</button>
    </div>

    <!-- ── Panel 1: 감정 선택 ─────────────────────────────── -->
    <div class="panel" id="panelSelect">
      <div class="header">
        <span class="star-icon">✨</span>
        <h1>지금 이 순간,<br>당신의 마음은 어떤가요</h1>
        <p>케이블카에서 느낀 감정을 하나 골라주세요</p>
      </div>

      <div class="emotion-grid">
        <button class="emotion-btn" data-emotion="설렘">
          <span class="emotion-emoji">🌟</span>설렘
        </button>
        <button class="emotion-btn" data-emotion="편안함">
          <span class="emotion-emoji">🌿</span>편안함
        </button>
        <button class="emotion-btn" data-emotion="기대">
          <span class="emotion-emoji">🌅</span>기대
        </button>
        <button class="emotion-btn" data-emotion="정리됨">
          <span class="emotion-emoji">🪐</span>정리됨
        </button>
      </div>

      <button class="btn-next" id="btnNext">별 만들기 →</button>
    </div>

    <!-- ── Panel 2: 이미지 Preview ────────────────────────── -->
    <div class="panel hidden" id="panelPreview">
      <div class="preview-header">
        <p>이런 별이 만들어졌어요</p>
      </div>

      <div class="preview-img-wrap">
        <div class="img-skeleton" id="imgSkeleton">
          <span class="skeleton-star">✨</span>
          <span class="skeleton-hint">별을 그리고 있어요...</span>
        </div>
        <img id="previewImg" alt="별 이미지">
      </div>

      <div class="emotion-text-label" id="emotionTextLabel"></div>
      <div class="loading-hint" id="loadingHint">잠깐, 별을 완성하고 있어요</div>

      <button class="btn-commit" id="btnCommit" disabled>✨ 별로 남기기</button>
      <button class="btn-back" id="btnBack">← 다시 선택</button>

      <div class="error-msg" id="errorMsg">잠시 후 다시 시도해주세요</div>
    </div>

  </div>

  <script>
    const params       = new URLSearchParams(window.location.search);
    const loc          = params.get('loc')  || 'direct';   // QR 스캔 시 항상 ?loc= 포함
    const isFromShare  = params.get('from') === 'share';
    const refKey       = params.get('ref')  || '';

    let selectedEmotion   = null;
    let previewImageUrl   = null;
    let previewInProgress = false;

    const panelIntro   = document.getElementById('panelIntro');
    const panelSelect  = document.getElementById('panelSelect');
    const panelPreview = document.getElementById('panelPreview');

    // ── 3개월 재방문 감지 — 잠긴 별이 있으면 unlock 페이지로 ──
    if (!isFromShare) {
      const _existingKey = localStorage.getItem('access_key');
      if (_existingKey && loc !== 'direct') {
        fetch(`/api/star/${encodeURIComponent(_existingKey)}`)
          .then(r => r.json())
          .then(data => {
            if (!data.success || !data.star) return;
            const monthsElapsed = (Date.now() - new Date(data.star.created_at).getTime())
                                  / (1000 * 60 * 60 * 24 * 30.44);
            if (monthsElapsed >= 3) {
              window.location.href =
                `/star-unlock.html?key=${encodeURIComponent(_existingKey)}&loc=${encodeURIComponent(loc)}`;
            }
          })
          .catch(() => {});
      }
    }

    // ── 공유 유입 인트로 ──────────────────────────────────
    if (isFromShare) {
      panelSelect.classList.add('hidden');
      panelIntro.classList.remove('hidden');

      if (refKey) {
        fetch(`/api/star/${encodeURIComponent(refKey)}`)
          .then(r => r.json())
          .then(data => {
            const imgUrl = data.image_url || data.star?.preview_image_url;
            if (imgUrl) {
              const img  = document.getElementById('introStarImg');
              const skel = document.getElementById('introSkeleton');
              img.onload = () => { skel.style.display = 'none'; img.classList.add('ready'); };
              img.onerror = () => { /* skeleton stays */ };
              img.src = imgUrl;
            }
          })
          .catch(() => {});
      }
    }

    document.getElementById('btnMakeStar').addEventListener('click', () => {
      panelIntro.classList.add('hidden');
      panelSelect.classList.remove('hidden');
    });
    const btnNext      = document.getElementById('btnNext');
    const btnCommit    = document.getElementById('btnCommit');
    const btnBack      = document.getElementById('btnBack');
    const imgSkeleton  = document.getElementById('imgSkeleton');
    const previewImg   = document.getElementById('previewImg');
    const loadingHint  = document.getElementById('loadingHint');
    const emotionLabel = document.getElementById('emotionTextLabel');
    const errorMsg     = document.getElementById('errorMsg');

    // ── Panel 1: 감정 선택 ────────────────────────────────
    document.querySelectorAll('.emotion-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedEmotion = btn.dataset.emotion;
        btnNext.classList.add('active');
      });
    });

    btnNext.addEventListener('click', async () => {
      if (!selectedEmotion || previewInProgress) return;
      previewInProgress = true;

      // Panel 전환 — 로딩 상태로 즉시 진입
      panelSelect.classList.add('hidden');
      panelPreview.classList.remove('hidden');
      imgSkeleton.classList.remove('hidden');
      previewImg.classList.remove('ready');
      previewImg.src = '';
      loadingHint.classList.remove('hidden');
      emotionLabel.textContent = '';
      btnCommit.disabled = true;
      errorMsg.style.display = 'none';
      previewImageUrl = null;

      try {
        const res  = await fetch('/api/star/preview', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ emotion: selectedEmotion, origin_location: loc }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'preview 실패');

        previewImageUrl          = data.image_url;
        emotionLabel.textContent = data.emotion_text || '';
        loadingHint.classList.add('hidden');

        previewImg.onload = () => {
          imgSkeleton.classList.add('hidden');
          previewImg.classList.add('ready');
          btnCommit.disabled = false;
        };
        previewImg.onerror = () => {
          imgSkeleton.classList.add('hidden');
          btnCommit.disabled = false;
        };
        previewImg.src = data.image_url;

      } catch {
        // preview 실패 → 사용자에게 commit 허용 (서버에서 fallback 처리)
        imgSkeleton.classList.add('hidden');
        loadingHint.classList.add('hidden');
        btnCommit.disabled = false;
      } finally {
        previewInProgress = false;
      }
    });

    // ── Panel 2: 다시 선택 ────────────────────────────────
    btnBack.addEventListener('click', () => {
      panelPreview.classList.add('hidden');
      panelSelect.classList.remove('hidden');
      errorMsg.style.display = 'none';
    });

    // ── Panel 2: 별로 남기기 ──────────────────────────────
    btnCommit.addEventListener('click', async () => {
      if (btnCommit.disabled) return;
      btnCommit.disabled    = true;
      btnCommit.textContent = '별로 남기는 중...';
      errorMsg.style.display = 'none';

      try {
        const res  = await fetch('/api/star/commit', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            emotion:           selectedEmotion,
            origin_location:   loc,
            preview_image_url: previewImageUrl,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '별 저장 실패');

        localStorage.setItem('access_key',       data.access_key);
        localStorage.setItem('star_id',         data.star_id);
        localStorage.setItem('emotion_linked',  data.emotion_link?.linked ? '1' : '0');
        localStorage.setItem('share_image_url', previewImageUrl || '');
        localStorage.setItem('origin_location', loc);

        window.location.href = '/promise.html';
      } catch {
        errorMsg.style.display    = 'block';
        btnCommit.disabled        = false;
        btnCommit.textContent     = '✨ 별로 남기기';
      }
    });
  </script>
</body>
</html>
