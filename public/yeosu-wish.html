<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FRRJ7JZPGZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FRRJ7JZPGZ');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여수 소원빌기 체험 - 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    /* 폼 카드 */
    .form-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-section {
      margin-bottom: 20px;
    }
    .form-section:last-child {
      margin-bottom: 0;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.9);
    }
    .form-label .required {
      color: #ff6b6b;
    }

    /* 입력 필드 */
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(255,255,255,0.15);
    }
    .form-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    textarea.form-input {
      resize: none;
      min-height: 100px;
    }

    /* 글자 수 카운터 */
    .char-counter {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .char-counter.warning {
      color: #ff6b6b;
    }

    /* 상품 선택 */
    .product-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .product-option {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .product-option:hover {
      border-color: rgba(255,215,0,0.5);
    }
    .product-option.selected {
      border-color: #ffd700;
      background: rgba(255,215,0,0.1);
    }
    .product-option input {
      display: none;
    }
    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 16px;
      font-weight: 600;
    }
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #ffd700;
    }
    .product-price.free {
      color: #4ecdc4;
    }
    .product-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    .product-features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .product-feature {
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
    }

    /* 단체 체크박스 */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #ffd700;
    }
    .group-size-input {
      display: none;
      margin-top: 12px;
    }
    .group-size-input.show {
      display: block;
    }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ffd700, #ffb347);
      border: none;
      border-radius: 16px;
      color: #1a1a2e;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,215,0,0.3);
    }
    .submit-btn:disabled {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 로딩 상태 */
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }
    .loading.show {
      display: block;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 16px;
      color: rgba(255,255,255,0.8);
    }

    /* 푸터 */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .footer a {
      color: #ffd700;
      text-decoration: none;
    }

    /* 반응형 */
    @media (max-width: 360px) {
      .container { padding: 0 10px; }
      .form-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-icon">🌟</div>
      <h1>여수 소원빌기 체험</h1>
      <p>여수 바다의 신비로운 빛 아래<br>당신의 소원을 AI 그림으로 만나보세요</p>
    </header>

    <form id="wish-form" class="form-card">
      <!-- 이름 -->
      <div class="form-section">
        <label class="form-label">
          이름 <span class="required">*</span>
        </label>
        <input type="text" name="customer_name" class="form-input"
               placeholder="이름을 입력해주세요" required maxlength="50">
      </div>

      <!-- 전화번호 -->
      <div class="form-section">
        <label class="form-label">
          전화번호 <span class="required">*</span>
        </label>
        <input type="tel" name="customer_phone" class="form-input"
               placeholder="010-0000-0000" required maxlength="15">
      </div>

      <!-- 이메일 (선택) -->
      <div class="form-section">
        <label class="form-label">이메일 (선택)</label>
        <input type="email" name="customer_email" class="form-input"
               placeholder="email@example.com" maxlength="100">
      </div>

      <!-- 소원 -->
      <div class="form-section">
        <label class="form-label">
          나의 소원 <span class="required">*</span>
        </label>
        <textarea name="wish_text" class="form-input" id="wish-text"
                  placeholder="이루고 싶은 소원을 적어주세요" required maxlength="100"></textarea>
        <div class="char-counter" id="char-counter">0 / 100자</div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        소원그림 받기
      </button>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">소원별을 만들고 있습니다…</p>
    </div>

    <footer class="footer">
      <p>문의: <a href="https://pf.kakao.com/_xfxhcWn/chat" target="_blank">카카오톡 채널</a></p>
      <p style="margin-top:8px">하루하루의 기적 | Daily Miracles</p>
    </footer>
  </div>

  <script>
    // 글자 수 카운터
    const wishTextEl  = document.getElementById('wish-text');
    const charCounter = document.getElementById('char-counter');
    wishTextEl.addEventListener('input', () => {
      const len = wishTextEl.value.length;
      charCounter.textContent = `${len} / 100자`;
      charCounter.classList.toggle('warning', len > 50);
    });

    // 소원 키워드 → gem_type 매핑
    function detectGemType(text) {
      if (/건강|치유|회복|아프|병/.test(text))               return 'emerald';
      if (/사랑|행복|가족|결혼|아이|아기|부모/.test(text))    return 'ruby';
      if (/성공|사업|돈|취업|합격|직장|승진|매출/.test(text)) return 'citrine';
      if (/공부|학업|시험|지혜|지식|입시/.test(text))         return 'sapphire';
      return 'diamond';
    }

    // 폼 제출 → DreamTown Star 생성
    const form    = document.getElementById('wish-form');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData  = new FormData(form);
      const name      = (formData.get('customer_name')  || '').trim();
      const phone     = (formData.get('customer_phone') || '').trim();
      const wish_text = (formData.get('wish_text')      || '').trim();

      if (!name || !phone || !wish_text) {
        alert('이름, 전화번호, 소원을 모두 입력해주세요.');
        return;
      }

      // 전화번호 기반 익명 user_id (동일 번호 → 동일 별 흐름 추적)
      const user_id  = 'yeosu_' + phone.replace(/\D/g, '');
      const gem_type = detectGemType(wish_text);

      form.style.display = 'none';
      loading.classList.add('show');

      try {
        const res = await fetch('/api/dt/engine/star', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id, wish_text, gem_type, yeosu_theme: 'yeosu' }),
        });

        const data = await res.json();

        if (!res.ok || !data.star?.id) {
          throw new Error(data.error || '소원 접수 중 오류가 발생했습니다.');
        }

        window.location.href = `/dt-upgrade.html?star_id=${data.star.id}`;

      } catch (err) {
        console.error('[yeosu-wish] 소원 접수 오류:', err);
        alert(err.message);
        loading.classList.remove('show');
        form.style.display = 'block';
      }
    });
  </script>
</body>
</html>
