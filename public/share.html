<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0818">
  <title>별 — 하루하루의 기적</title>

  <meta property="og:title"       content="누군가의 별이 여기 있어요">
  <meta property="og:description" content="괜찮아졌어요 ✨">
  <meta property="og:image"       content="/images/fallback/star-default.svg">
  <meta property="og:type"        content="website">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #07060f;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 배경 이미지 ─────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #07060f;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .bg.loaded { opacity: 1; }

    /* ── 그라디언트 오버레이
         이미지가 화면 70~80%에서 숨 쉬도록
         상단은 거의 투명, 하단만 어둡게           ── */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(7, 6, 15, 0.22) 0%,
          rgba(7, 6, 15, 0.0)  28%,
          rgba(7, 6, 15, 0.0)  52%,
          rgba(7, 6, 15, 0.78) 78%,
          rgba(7, 6, 15, 0.96) 100%
        );
    }

    /* ── 콘텐츠 레이어 ───────────────────────────────────── */
    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding:
        env(safe-area-inset-top,  40px) 32px
        calc(env(safe-area-inset-bottom, 0px) + 48px);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── 상단: 별 이름 — 가장 조용하게 ─────────────────── */
    .star-name {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.32);
      letter-spacing: 0.6px;
      animation: fadeIn 0.7s ease both 0.4s;
      min-height: 16px;
    }

    /* ── 하단 영역 ───────────────────────────────────────── */
    .bottom-area {
      display: flex;
      flex-direction: column;
      gap: 22px;
      animation: fadeUp 0.65s ease both 0.5s;
    }

    /* 메인 감정 문장 — 약간 크게, 조용한 존재감 */
    .emotion-phrase {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.55;
      letter-spacing: -0.4px;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55);
    }

    /* 링크 — 작게, 밑줄만, 버튼 아님 */
    .entry-link {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.34);
      text-decoration: none;
      letter-spacing: 0.4px;
      display: inline;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      padding-bottom: 2px;
      transition: color 0.25s, border-color 0.25s;
      -webkit-tap-highlight-color: transparent;
    }
    .entry-link:hover,
    .entry-link:active {
      color: rgba(255, 255, 255, 0.6);
      border-color: rgba(255, 255, 255, 0.38);
    }

    /* ── 애니메이션 ─────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 로딩 스켈레톤 ──────────────────────────────────── */
    .skeleton .star-name    { color: transparent; }
    .skeleton .emotion-phrase {
      color: transparent;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      width: 52%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .skeleton .entry-link {
      opacity: 0;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.75; }
    }
  </style>
</head>
<body>
  <div class="bg"      id="bg"></div>
  <div class="overlay"></div>

  <div class="content skeleton" id="content">
    <div class="star-name" id="starName"></div>
    <div class="bottom-area">
      <div class="emotion-phrase" id="emotionPhrase">&nbsp;</div>
      <a class="entry-link" id="entryLink" href="/star-entry.html">나도 이런 별 하나</a>
    </div>
  </div>

  <script>
    const EMOTION_TEXT = {
      '설렘':   '괜찮아졌어요 ✨',
      '편안함': '조금 가벼워졌어요',
      '기대':   '기대가 별이 됐어요',
      '정리됨': '지금이 괜찮아요',
    };

    const EMOTION_BG = {
      '설렘':   '/images/fallback/star-yeosu-cablecar.svg',
      '편안함': '/images/fallback/star-yeosu-cablecar.svg',
      '기대':   '/images/fallback/star-yeosu-cablecar.svg',
      '정리됨': '/images/fallback/star-paransi.svg',
    };

    const params  = new URLSearchParams(window.location.search);
    const key     = params.get('key');
    const bgEl    = document.getElementById('bg');
    const content = document.getElementById('content');

    function applyBg(url) {
      bgEl.style.backgroundImage = `url('${encodeURI(url)}')`;
      const img = new Image();
      img.onload  = () => bgEl.classList.add('loaded');
      img.onerror = () => bgEl.classList.add('loaded');
      img.src = url;
    }

    function render({ starName, emotionPhrase, bgUrl, ctaHref }) {
      document.getElementById('starName').textContent      = starName;
      document.getElementById('emotionPhrase').textContent = emotionPhrase;
      document.getElementById('entryLink').href            = ctaHref;
      applyBg(bgUrl);
      content.classList.remove('skeleton');
    }

    async function loadStar() {
      const fallback = {
        starName:      '',
        emotionPhrase: '괜찮아졌어요 ✨',
        bgUrl:         '/images/fallback/star-default.svg',
        ctaHref:       '/star-entry.html?ref=share',
      };

      if (!key) return render(fallback);

      try {
        const res  = await fetch(`/api/star/${encodeURIComponent(key)}`);
        const data = await res.json();
        if (!data.success) return render(fallback);

        const { star, image_url } = data;
        const emotion       = star.emotion || '';
        const emotionPhrase = EMOTION_TEXT[emotion] || '괜찮아졌어요 ✨';
        const starName      = emotion ? `${emotion}의 별` : '';
        const bgUrl         = image_url || EMOTION_BG[emotion] || '/images/fallback/star-default.svg';
        const loc           = star.origin_location || 'cablecar';
        const ctaHref       = `/star-entry.html?loc=${encodeURIComponent(loc)}&ref=share`;

        render({ starName, emotionPhrase, bgUrl, ctaHref });
      } catch {
        render(fallback);
      }
    }

    loadStar();
  </script>
</body>
</html>
