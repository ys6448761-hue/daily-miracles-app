<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0818">
  <title>별 🌌 — 하루하루의 기적</title>

  <!-- OG / 공유 미리보기 -->
  <meta property="og:title"       content="누군가의 별이 당신을 불렀어요 🌌">
  <meta property="og:description" content="괜찮아졌어요 ✨">
  <meta property="og:image"       content="/images/fallback/star-default.svg">
  <meta property="og:type"        content="website">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0a0818;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* 전체 화면 배경 이미지 */
    .bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #0a0818;
      transition: opacity 0.6s ease;
      opacity: 0;
    }
    .bg.loaded { opacity: 1; }

    /* 그라디언트 오버레이 — 상단/하단만 어둡게, 중앙 투명 */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(4, 3, 18, 0.6) 0%,
          rgba(4, 3, 18, 0.0) 30%,
          rgba(4, 3, 18, 0.0) 60%,
          rgba(4, 3, 18, 0.85) 100%
        );
    }

    /* 콘텐츠 레이어 */
    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 48px) 28px
               calc(env(safe-area-inset-bottom, 0px) + 36px);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* 상단: 별 이름 */
    .star-name {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.2px;
      animation: fadeDown 0.5s ease both 0.1s;
    }

    /* 중앙: 감정 문장 */
    .emotion-phrase {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
      animation: fadeUp 0.55s ease both 0.2s;
    }

    /* 하단: CTA — thumb zone */
    .cta-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp 0.5s ease both 0.35s;
    }

    .btn-cta {
      width: 100%;
      padding: 19px 24px;
      background: rgba(255, 255, 255, 0.96);
      border: none;
      border-radius: 18px;
      color: #0a0818;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      letter-spacing: -0.2px;
      text-decoration: none;
      display: block;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn-cta:active {
      transform: scale(0.97);
      opacity: 0.88;
    }

    .hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.5px;
    }

    /* 애니메이션 */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 로딩 중 skeleton */
    .skeleton .emotion-phrase {
      color: transparent;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      width: 60%;
      margin: 0 auto;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="content skeleton" id="content">
    <div class="star-name" id="starName">— 🌌</div>
    <div class="emotion-phrase" id="emotionPhrase">&nbsp;</div>
    <div class="cta-area">
      <a class="btn-cta" id="btnCta" href="/star-entry.html">내 별 만들기</a>
      <div class="hint">하루하루의 기적</div>
    </div>
  </div>

  <script>
    const EMOTION_TEXT = {
      '설렘':   '괜찮아졌어요 ✨',
      '편안함': '조금 가벼워졌어요',
      '기대':   '기대가 별이 됐어요',
      '정리됨': '지금이 괜찮아요',
    };

    const EMOTION_BG = {
      '설렘':   '/images/fallback/star-yeosu-cablecar.svg',
      '편안함': '/images/fallback/star-yeosu-cablecar.svg',
      '기대':   '/images/fallback/star-yeosu-cablecar.svg',
      '정리됨': '/images/fallback/star-paransi.svg',
    };

    const params     = new URLSearchParams(window.location.search);
    const key        = params.get('key');
    const bgEl       = document.getElementById('bg');
    const contentEl  = document.getElementById('content');

    function applyBg(url) {
      bgEl.style.backgroundImage = `url('${encodeURI(url)}')`;
      const img = new Image();
      img.onload  = () => bgEl.classList.add('loaded');
      img.onerror = () => bgEl.classList.add('loaded');
      img.src = url;
    }

    function render({ starName, emotionPhrase, bgUrl, ctaHref }) {
      document.getElementById('starName').textContent     = starName;
      document.getElementById('emotionPhrase').textContent = emotionPhrase;
      document.getElementById('btnCta').href              = ctaHref;
      applyBg(bgUrl);
      contentEl.classList.remove('skeleton');
    }

    async function loadStar() {
      const fallback = {
        starName:      '누군가의 별 🌌',
        emotionPhrase: '괜찮아졌어요 ✨',
        bgUrl:         '/images/fallback/star-default.svg',
        ctaHref:       '/star-entry.html?ref=share',
      };

      if (!key) return render(fallback);

      try {
        const res  = await fetch(`/api/star/${encodeURIComponent(key)}`);
        const data = await res.json();
        if (!data.success) return render(fallback);

        const { star, image_url } = data;
        const emotion       = star.emotion || '';
        const emotionPhrase = EMOTION_TEXT[emotion] || '괜찮아졌어요 ✨';
        const starName      = emotion ? `${emotion}의 별 🌌` : '누군가의 별 🌌';
        const bgUrl         = image_url || EMOTION_BG[emotion] || '/images/fallback/star-default.svg';
        const loc           = star.origin_location || 'cablecar';
        const ctaHref       = `/star-entry.html?loc=${encodeURIComponent(loc)}&ref=share`;

        render({ starName, emotionPhrase, bgUrl, ctaHref });
      } catch {
        render(fallback);
      }
    }

    loadStar();
  </script>
</body>
</html>
