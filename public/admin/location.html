<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장소 관리자 — 하루하루의 기적</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .header {
      max-width: 640px;
      margin: 0 auto 32px;
    }
    .location-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .header .updated {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.12); }

    .section { max-width: 640px; margin: 0 auto 28px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    /* 통계 카드 */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 32px;
      font-weight: 700;
      color: #c9b8ff;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .lbl {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }
    .stat-card.today .val { color: #7dd3fc; }
    .stat-card.resonance .val { color: #f9a8d4; }

    /* 대표 문장 */
    .representative {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 20px;
    }
    .representative .quote {
      font-size: 15px;
      line-height: 1.7;
      color: #e8e8f0;
      font-style: italic;
    }
    .representative .quote::before { content: '"'; color: #c9b8ff; margin-right: 2px; }
    .representative .quote::after  { content: '"'; color: #c9b8ff; margin-left: 2px; }
    .representative .meta {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
    .empty-state {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      padding: 16px 0;
    }

    /* 감정 TOP 3 */
    .emotion-list { display: flex; flex-direction: column; gap: 8px; }
    .emotion-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .emotion-rank {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      width: 18px;
    }
    .emotion-name {
      flex: 1;
      font-size: 14px;
      color: #e8e8f0;
    }
    .emotion-cnt {
      font-size: 13px;
      color: #c9b8ff;
      font-weight: 600;
    }

    /* 최근 별 */
    .star-table { width: 100%; border-collapse: collapse; }
    .star-table th {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .star-table td {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
    }
    .star-table tr:last-child td { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      background: rgba(201,184,255,0.15);
      color: #c9b8ff;
    }
    .res-dot { color: #f9a8d4; font-weight: 600; }

    /* 에러/로딩 */
    .loading {
      max-width: 640px;
      margin: 80px auto;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .error-box {
      max-width: 640px;
      margin: 40px auto;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 20px;
      color: #fca5a5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"><div class="loading">불러오는 중...</div></div>

  <script>
    const segments = window.location.pathname.split('/');
    const code     = segments[segments.length - 1];
    const token    = new URLSearchParams(window.location.search).get('token') || '';

    async function load() {
      const app = document.getElementById('app');
      try {
        const qs  = token ? `?token=${encodeURIComponent(token)}` : '';
        const res = await fetch(`/api/admin/dt/location/${code}${qs}`);
        if (res.status === 401) {
          app.innerHTML = `<div class="error-box">🔒 관리자 토큰이 필요합니다.<br>URL에 <code>?token=ADMIN_TOKEN</code> 을 추가해주세요.</div>`;
          return;
        }
        if (res.status === 404) {
          app.innerHTML = `<div class="error-box">알 수 없는 장소 코드: <strong>${code}</strong></div>`;
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();
        render(d);
      } catch (err) {
        app.innerHTML = `<div class="error-box">데이터 조회 실패: ${err.message}</div>`;
      }
    }

    function fmt(dt) {
      const d = new Date(dt);
      return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function render(d) {
      const { location, stats, representative, emotion_top3, recent_stars } = d;
      const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

      const emotionHtml = emotion_top3.length === 0
        ? `<p class="empty-state">감정 데이터 없음</p>`
        : emotion_top3.map((e, i) => `
            <div class="emotion-row">
              <span class="emotion-rank">${i + 1}</span>
              <span class="emotion-name">${e.emotion}</span>
              <span class="emotion-cnt">${e.count}개</span>
            </div>`).join('');

      const recentHtml = recent_stars.length === 0
        ? `<tr><td colspan="4" style="color:rgba(255,255,255,0.3);text-align:center;padding:20px">최근 별 없음</td></tr>`
        : recent_stars.map(s => `
            <tr>
              <td>${s.star_name || '—'}</td>
              <td>${s.wish_preview ? s.wish_preview + (s.wish_preview.length >= 30 ? '…' : '') : '—'}</td>
              <td>${s.emotion_tag ? `<span class="tag">${s.emotion_tag}</span>` : '—'}</td>
              <td><span class="res-dot">♥ ${s.resonance_count ?? 0}</span></td>
              <td>${fmt(s.created_at)}</td>
            </tr>`).join('');

      const repHtml = representative
        ? `<p class="quote">${representative.wish_text}</p>
           <p class="meta">${representative.star_name} · 공명 ${representative.resonance_count}회</p>`
        : `<p class="empty-state">아직 등록된 별 없음</p>`;

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="location-badge">${location.emoji} ${location.name}</div>
          <h1>장소 관리자 대시보드</h1>
          <p class="updated">기준: ${now}</p>
          <button class="refresh-btn" onclick="load()">↻ 새로고침</button>
        </div>

        <div class="section">
          <div class="section-title">핵심 지표</div>
          <div class="stat-grid">
            <div class="stat-card today">
              <div class="val">${stats.today_stars}</div>
              <div class="lbl">오늘 별 생성</div>
            </div>
            <div class="stat-card">
              <div class="val">${stats.total_stars}</div>
              <div class="lbl">누적 별</div>
            </div>
            <div class="stat-card resonance">
              <div class="val">${stats.total_resonance}</div>
              <div class="lbl">총 공명</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">대표 문장</div>
          <div class="representative">${repHtml}</div>
        </div>

        <div class="section">
          <div class="section-title">감정 TOP 3</div>
          <div class="emotion-list">${emotionHtml}</div>
        </div>

        <div class="section">
          <div class="section-title">최근 별 5개</div>
          <table class="star-table">
            <thead>
              <tr>
                <th>별 이름</th>
                <th>소원 미리보기</th>
                <th>감정</th>
                <th>공명</th>
                <th>생성일시</th>
              </tr>
            </thead>
            <tbody>${recentHtml}</tbody>
          </table>
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
