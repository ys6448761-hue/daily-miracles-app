<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#12102a"/>
      <stop offset="60%" stop-color="#080818"/>
      <stop offset="100%" stop-color="#03030c"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddccff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#9977ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5533bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lighthouse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffaa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffff00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Sea -->
  <rect x="0" y="620" width="1024" height="404" fill="#05040f" opacity="0.95"/>
  <!-- Hilltop silhouette -->
  <path d="M 0 700 Q 200 580 400 640 Q 512 660 624 640 Q 824 580 1024 700 L 1024 1024 L 0 1024 Z"
        fill="#0a0818" opacity="0.95"/>
  <!-- Lighthouse -->
  <rect x="490" y="520" width="44" height="120" rx="4" fill="#1a1530" opacity="0.8"/>
  <polygon points="490,520 534,520 520,490 504,490" fill="#1a1530" opacity="0.9"/>
  <!-- Lighthouse beam -->
  <circle cx="512" cy="505" r="40" fill="url(#lighthouse)"/>
  <circle cx="512" cy="505" r="8" fill="#ffff99" opacity="0.9"/>
  <!-- Horizon glow -->
  <ellipse cx="200" cy="622" rx="60" ry="8" fill="#ffcc44" opacity="0.15"/>
  <!-- Star -->
  <circle cx="512" cy="280" r="80" fill="url(#star-glow)"/>
  <polygon points="512,232 523,266 559,266 531,287 542,321 512,300 482,321 493,287 465,266 501,266"
           fill="#eeddff" opacity="0.95"/>
  <!-- Korean text -->
  <text x="512" y="420" font-family="serif" font-size="28" fill="#d8c8ff" text-anchor="middle" opacity="0.85">괜찮아졌어요 ✨</text>
</svg>
