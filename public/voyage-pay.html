<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이 여행 시작하기 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 0 0 60px;
    }
    .container { max-width: 420px; margin: 0 auto; padding: 0 24px; }

    /* ── 상단 ── */
    .hero {
      text-align: center;
      padding: 52px 0 32px;
    }
    .hero-lead {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.8px;
      color: rgba(100,160,255,0.6);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-title {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.93);
      line-height: 1.5;
    }

    /* ── 선택 요약 카드 ── */
    .summary-card {
      background: rgba(100,160,255,0.07);
      border: 1.5px solid rgba(100,160,255,0.18);
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 14px;
    }
    .summary-type {
      font-size: 13px;
      font-weight: 600;
      color: rgba(100,160,255,0.7);
      margin-bottom: 14px;
    }
    .summary-price-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .summary-price { font-size: 28px; font-weight: 700; color: #a8c8ff; }
    .summary-note { font-size: 12px; color: rgba(255,255,255,0.35); text-align: right; line-height: 1.6; }

    /* ── 포함 내역 ── */
    .includes-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 22px;
    }
    .includes-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .includes-list { display: flex; flex-direction: column; gap: 8px; }
    .includes-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    .includes-icon { font-size: 15px; flex-shrink: 0; }

    /* ── 입력 ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 16px 18px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: rgba(100,160,255,0.45); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .error-msg {
      display: none;
      font-size: 12px;
      color: #ff8a80;
      margin-top: 6px;
    }

    /* ── 하단 안내 ── */
    .notice {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      line-height: 1.75;
      margin-bottom: 26px;
      text-align: center;
    }

    /* ── CTA ── */
    .btn-submit {
      display: block;
      width: 100%;
      padding: 20px;
      background: linear-gradient(90deg, #4f8ef7 0%, #7b5ea7 100%);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
    }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">

    <div class="hero">
      <div class="hero-lead" id="typeLead">쉼</div>
      <div class="hero-title">이 시간을<br>완성해볼까요</div>
    </div>

    <div class="summary-card">
      <div class="summary-type" id="summaryType">조용히 쉬는 여행</div>
      <div class="summary-price-row">
        <div class="summary-price">35,000원</div>
        <div class="summary-note">약 30,000원 상당<br>혜택 포함</div>
      </div>
    </div>

    <div class="includes-card">
      <div class="includes-label">함께하는 것들</div>
      <div class="includes-list">
        <div class="includes-item"><span class="includes-icon">🌊</span>감정 흐름 + 소원항해 경험</div>
        <div class="includes-item"><span class="includes-icon">☕</span>3합 혜택 — 카페·맛집·낭만도시</div>
        <div class="includes-item"><span class="includes-icon">🌙</span>달빛 혜택 — 노래방·오락실·식혜</div>
        <div class="includes-item"><span class="includes-icon">🚡</span>여수 레저 연결 안내</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="phoneInput">연락처 *</label>
      <input class="form-input" id="phoneInput" type="tel" placeholder="010-0000-0000"
        autocomplete="tel" inputmode="numeric">
      <div class="error-msg" id="phoneError">연락처를 입력해주세요</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="nameInput">이름 (선택)</label>
      <input class="form-input" id="nameInput" type="text" placeholder="홍길동" autocomplete="name">
    </div>

    <div class="notice">
      연락처는 안내 확인에만 사용됩니다.<br>
      진행 후 당일 내 취소 시 전액 환불됩니다.
    </div>

    <button class="btn-submit" id="btnSubmit">이 여행 시작하기</button>

  </div>

  <script>
    const TYPE_INFO = {
      rest:    { lead: '쉼',  name: '조용히 쉬는 여행' },
      reflect: { lead: '정리', name: '생각을 정리하는 여행' },
      move:    { lead: '설렘', name: '조금 설레는 여행' },
    };

    const params  = new URLSearchParams(window.location.search);
    const type    = params.get('type') || 'rest';
    const starId  = params.get('star_id') || localStorage.getItem('star_id') || '';
    const info    = TYPE_INFO[type] || TYPE_INFO.rest;

    document.getElementById('typeLead').textContent   = info.lead;
    document.getElementById('summaryType').textContent = info.name;

    const btn        = document.getElementById('btnSubmit');
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');

    btn.addEventListener('click', async () => {
      const phone = phoneInput.value.trim().replace(/\s/g, '');
      if (!phone) {
        phoneError.style.display = 'block';
        phoneInput.focus();
        return;
      }
      phoneError.style.display = 'none';
      btn.disabled    = true;
      btn.textContent = '준비 중...';

      try {
        const res = await fetch('/api/star-voyage/create', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type,
            phone_number: phone,
            star_id: starId || null,
            name:    document.getElementById('nameInput').value.trim() || null,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '오류가 발생했습니다');
        window.location.href = data.payment_url;
      } catch (err) {
        btn.disabled    = false;
        btn.textContent = '이 여행 시작하기';
        alert(err.message || '오류가 발생했습니다. 다시 시도해주세요.');
      }
    });

    phoneInput.addEventListener('input', () => { phoneError.style.display = 'none'; });
  </script>
</body>
</html>
