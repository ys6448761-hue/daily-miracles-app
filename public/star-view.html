<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 별 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      min-height: 100vh;
      padding: 0 0 60px;
      color: #fff;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 0 20px; }

    /* ── 헤더 ── */
    .page-header {
      text-align: center;
      padding: 40px 0 32px;
    }
    .star-icon { font-size: 60px; display: block; margin-bottom: 14px; }
    .star-image-wrap {
      width: 160px;
      height: 240px;
      margin: 0 auto 16px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 32px rgba(100,160,255,0.2);
    }
    .star-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .date-badge {
      display: inline-block;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 14px;
    }

    /* ── 블록 공통 ── */
    .block {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 14px;
    }
    .block-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    /* ── 블록 1: 과거 ── */
    .emotion-chip {
      display: inline-block;
      background: rgba(100,160,255,0.18);
      border: 1px solid rgba(100,160,255,0.35);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 14px;
      color: #a8c8ff;
      margin-bottom: 14px;
    }
    .promise-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .promise-item:last-child { margin-bottom: 0; }
    .promise-type-label {
      font-size: 11px;
      color: #64a0ff;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .promise-text {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(255,255,255,0.88);
    }
    .promise-when {
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    /* ── 블록 2: 현재 ── */
    .reflect-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reflect-btn {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 16px 20px;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .reflect-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
    .reflect-btn.selected {
      background: rgba(100,160,255,0.2);
      border-color: #64a0ff;
    }
    .reflect-btn.disabled { opacity: 0.45; pointer-events: none; }
    .reflect-emoji { font-size: 22px; flex-shrink: 0; }

    /* ── 블록 3: 다음 ── */
    #block3 { display: none; }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 18px 20px;
      background: linear-gradient(90deg, #4f8ef7 0%, #7b5ea7 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
    }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
    }
    .btn-ghost-link {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .share-toast {
      display: none;
      font-size: 12px;
      color: #7bc67e;
      text-align: center;
      margin-top: 8px;
    }

    /* ── 로딩 / 에러 ── */
    .loading-state {
      text-align: center;
      padding: 80px 0;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .not-found { text-align: center; padding: 80px 0; }
    .not-found h2 { font-size: 18px; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .btn-ghost {
      display: inline-block;
      padding: 12px 24px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      text-decoration: none;
    }

    /* ── 저장 완료 안내 ── */
    .saved-badge {
      display: none;
      font-size: 12px;
      color: #7bc67e;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app">
      <div class="loading-state">별을 불러오는 중...</div>
    </div>
  </div>

  <script>
    const TYPE_LABELS  = { '3m': '3개월 후', '6m': '6개월 후', '12m': '1년 후' };

    // 소원그림 경로 계산 (서버 getStarImage와 동일한 로직)
    const EMOTION_BASE = { confusion: 1, pause: 6, calm: 11, curiosity: 16, fragile_hope: 21 };
    const GEM_OFFSET   = { citrine: 0, sapphire: 1, emerald: 2, ruby: 3, amethyst: 4 };

    function getStarImagePath(emotion, gem) {
      const base   = EMOTION_BASE[emotion];
      const offset = GEM_OFFSET[gem];
      if (base == null || offset == null) return null;
      const idx = String(base + offset).padStart(2, '0');
      return `/images/star-cache/yeosu_cafe/${idx}_${emotion}_${gem}_yeosu_cafe_stage2.png`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getPrimaryType(promises) {
      if (!promises.length) return null;
      const order = ['12m','6m','3m'];
      for (const t of order) {
        if (promises.find(p => p.type === t)) return t;
      }
      return promises[0].type;
    }

    let globalStarId   = null;
    let globalImageUrl = null;
    let globalEmotion  = null;
    let globalAccessKey = null;

    async function loadStar() {
      const _qp = new URLSearchParams(window.location.search);
      const accessKey = _qp.get('key') || window.location.pathname.split('/').filter(Boolean).pop();
      if (!accessKey) return renderNotFound();
      globalAccessKey = accessKey;

      try {
        const res  = await fetch(`/api/star/${accessKey}`);
        const data = await res.json();
        if (!data.success) return renderNotFound();
        render(data.star, data.promises, data.last_reflection, data.image_url ?? null);
      } catch {
        renderNotFound();
      }
    }

    function render(star, promises, lastReflection, image_url) {
      globalStarId  = star.id;
      globalEmotion = star.emotion || null;
      globalImageUrl = image_url || getStarImagePath(star.emotion, star.gem_type) || null;

      const primaryType = getPrimaryType(promises);
      const alreadyRefl = !!lastReflection;

      const headerMedia = globalImageUrl
        ? `<div class="star-image-wrap"><img class="star-img" src="${escHtml(globalImageUrl)}" alt="소원그림" /></div>`
        : `<span class="star-icon">⭐</span>`;

      const promisesHtml = promises.length > 0
        ? promises.map(p => `
            <div class="promise-item">
              <div class="promise-type-label">${TYPE_LABELS[p.type] || p.type}</div>
              <div class="promise-text">${escHtml(p.content)}</div>
              <div class="promise-when">열리는 날 ${formatDate(p.target_date || p.created_at)}</div>
            </div>`).join('')
        : `<div style="font-size:14px;color:rgba(255,255,255,0.4);padding:8px 0">약속이 없어요</div>`;

      const reflStatus = alreadyRefl
        ? `<div style="font-size:13px;color:rgba(255,255,255,0.4);padding:8px 0">이미 기록했어요 — ${escHtml(lastReflection.status)}</div>`
        : '';

      const downloadBtn = globalImageUrl
        ? `<button class="btn-primary" onclick="downloadStarImage()">소원그림 받기</button>`
        : '';

      document.getElementById('app').innerHTML = `
        <div class="page-header">
          ${headerMedia}
          <div class="date-badge">${formatDate(star.created_at)} · 케이블카</div>
        </div>

        <!-- 블록 1: 과거의 나 -->
        <div class="block">
          <div class="block-label">그날의 당신</div>
          ${star.emotion ? `<div class="emotion-chip">${escHtml(star.emotion)}</div>` : ''}
          ${promisesHtml}
        </div>

        <!-- 블록 2: 지금의 나 -->
        <div class="block" id="block2">
          <div class="block-label">지금의 당신은 어떤가요</div>
          ${reflStatus}
          <div class="reflect-grid ${alreadyRefl ? 'already' : ''}">
            <button class="reflect-btn ${alreadyRefl ? 'disabled' : ''}" data-status="closer">
              <span class="reflect-emoji">🌱</span>조금 가까워졌어요
            </button>
            <button class="reflect-btn ${alreadyRefl ? 'disabled' : ''}" data-status="same">
              <span class="reflect-emoji">🌙</span>그대로예요
            </button>
            <button class="reflect-btn ${alreadyRefl ? 'disabled' : ''}" data-status="changed">
              <span class="reflect-emoji">🌀</span>생각이 달라졌어요
            </button>
          </div>
          <div class="saved-badge" id="savedBadge">✓ 기록됐어요</div>
        </div>

        <!-- 블록 3: 다음 선택 -->
        <div class="block" id="block3" ${alreadyRefl ? 'style="display:block"' : ''}>
          <div class="block-label">이제, 다음을 선택해보세요</div>
          ${downloadBtn}
          <button class="btn-secondary" onclick="shareWish()">이 이야기를 나누기</button>
          <a class="btn-ghost-link" href="/journey">여수 소원여정 보기</a>
          <div class="share-toast" id="shareToast">링크가 복사됐어요</div>
        </div>
      `;

      document.querySelectorAll('.reflect-btn:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', () => handleReflect(btn.dataset.status));
      });
    }

    async function downloadStarImage() {
      if (!globalImageUrl) return;

      const canvas = document.createElement('canvas');
      canvas.width  = 1024;
      canvas.height = 1536;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      img.crossOrigin = 'anonymous';

      img.onload = () => {
        ctx.drawImage(img, 0, 0, 1024, 1536);

        // 하단 브랜드 밴드
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 1456, 1024, 80);
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.fillText('하루하루의 기적', 512, 1502);

        const link = document.createElement('a');
        link.download = 'dreamtown_wish.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      img.onerror = () => {
        // 이미지 로드 실패 시 직접 열기
        window.open(globalImageUrl, '_blank');
      };

      img.src = globalImageUrl;
    }

    async function shareWish() {
      const shareUrl = globalAccessKey
        ? `${location.origin}/star-entry.html?ref=${encodeURIComponent(globalAccessKey)}`
        : window.location.href;
      const text = globalEmotion
        ? `나의 별 — ${globalEmotion}의 기적`
        : '나의 별 — 하루하루의 기적';

      let channel = 'clipboard';

      if (navigator.share) {
        try {
          await navigator.share({ title: '하루하루의 기적', text, url: shareUrl });
          channel = 'native';
          recordShare(channel);
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }

      // 클립보드 fallback
      try {
        await navigator.clipboard.writeText(shareUrl);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = shareUrl;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      recordShare(channel);

      const toast = document.getElementById('shareToast');
      if (toast) {
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
      }
    }

    function recordShare(channel) {
      if (!globalAccessKey) return;
      fetch(`/api/star/share/${encodeURIComponent(globalAccessKey)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel }),
      }).catch(() => {});
    }

    async function handleReflect(status) {
      if (!globalStarId) return;

      document.querySelectorAll('.reflect-btn').forEach(b => {
        b.classList.add('disabled');
        if (b.dataset.status === status) b.classList.add('selected');
      });

      try {
        await fetch('/api/star/reflect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ star_id: globalStarId, status }),
        });
      } catch { /* 저장 실패해도 UX 계속 진행 */ }

      document.getElementById('savedBadge').style.display = 'block';

      setTimeout(() => {
        const b3 = document.getElementById('block3');
        if (b3) {
          b3.style.display = 'block';
          b3.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 400);
    }

    function renderNotFound() {
      document.getElementById('app').innerHTML = `
        <div class="not-found">
          <h2>별을 찾을 수 없어요</h2>
          <p>접근 코드를 다시 확인해주세요</p>
          <a class="btn-ghost" href="/star-entry.html">새 별 만들기</a>
        </div>`;
    }

    loadStar();
  </script>
</body>
</html>
