<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 별 이야기 — Daily Miracles</title>
  <meta property="og:title"       content="PLACEHOLDER_OG_TITLE">
  <meta property="og:description" content="PLACEHOLDER_OG_DESC">
  <meta property="og:image"       content="PLACEHOLDER_OG_IMAGE">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:image"      content="PLACEHOLDER_OG_IMAGE">
  <style>
    :root {
      --bg: #080814;
      --surface: #0f0f1e;
      --primary: #9B87F5;
      --secondary: #F5A7C6;
      --text: #e8e8f0;
      --text-dim: #6666aa;
      --border: rgba(155,135,245,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    .hdr {
      width: 100%; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .hdr-logo { font-size: 14px; color: var(--text-dim); }
    .hdr-meta { font-size: 12px; color: var(--text-dim); }

    /* Page body */
    .page { width: 100%; max-width: 480px; padding: 32px 20px 60px; }

    /* Hero */
    .hero {
      text-align: center; margin-bottom: 32px;
      padding: 24px; background: linear-gradient(135deg, rgba(155,135,245,0.08), rgba(245,167,198,0.05));
      border: 1px solid var(--border); border-radius: 20px;
    }
    .hero-emotion { font-size: 30px; margin-bottom: 8px; }
    .hero-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .hero-sub { font-size: 13px; color: var(--text-dim); }

    /* Slides */
    .slides { display: flex; flex-direction: column; gap: 16px; }

    /* Image slide */
    .slide-image {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
    }
    .slide-image img { width: 100%; height: 100%; object-fit: cover; }
    .slide-image-ph {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 32px;
    }
    .slide-loc-icon { font-size: 40px; }
    .slide-loc-name { font-size: 14px; color: var(--text-dim); }
    .slide-em-tag {
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .em-confusion    { background: rgba(155,135,245,0.15); color: #b8a8f8; }
    .em-calm         { background: rgba(100,180,255,0.15); color: #80c8f5; }
    .em-fragile_hope { background: rgba(245,200,90,0.15);  color: #f5d070; }
    .em-curiosity    { background: rgba(90,245,180,0.15);  color: #70f5c0; }
    .em-pause        { background: rgba(245,120,120,0.15); color: #f58888; }

    /* Text slide */
    .slide-text {
      padding: 28px 24px; text-align: center;
      border-left: 3px solid var(--primary);
      background: rgba(155,135,245,0.04);
    }
    .slide-text p {
      font-size: 17px; font-weight: 600; line-height: 1.8; color: var(--text);
      white-space: pre-line;
    }

    /* Main star slide */
    .slide-main-star {
      background: linear-gradient(135deg, rgba(155,135,245,0.12), rgba(245,167,198,0.08));
      border: 1px solid rgba(155,135,245,0.3); border-radius: 16px;
      overflow: hidden; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
    }
    .slide-main-star-ph {
      text-align: center; padding: 32px;
    }
    .slide-main-star-ph .star-glow {
      font-size: 56px; display: block; margin-bottom: 12px;
      filter: drop-shadow(0 0 16px rgba(155,135,245,0.8));
    }
    .slide-main-star-ph p { font-size: 14px; color: var(--text-dim); }

    /* CTA */
    .cta-wrap { margin-top: 36px; text-align: center; }
    .cta-text { font-size: 15px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
    .cta-btn {
      display: inline-block; padding: 14px 32px; background: var(--primary);
      color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700;
      text-decoration: none; transition: opacity .2s;
    }
    .cta-btn:hover { opacity: .88; }

    /* Loading */
    .loading { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 15px; }
    .loading::after { content: ''; display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-left: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 80px 20px; color: var(--text-dim); }

    /* ── Impact Flow ── */
    .impact-flow { margin-top: 48px; min-height: 300px; position: relative; display: none; }
    .impact-flow.revealed { display: block; animation: stepIn .55s ease both; }

    .impact-step { display: none; }
    .impact-step.active { display: block; animation: stepIn .44s cubic-bezier(.25,.46,.45,.94) both; }
    .impact-step.exit   { animation: stepOut .28s ease both; pointer-events: none;
                          position: absolute; inset: 0; }

    @keyframes stepIn  { from { opacity:0; transform: translateY(20px); }
                         to   { opacity:1; transform: translateY(0);    } }
    @keyframes stepOut { from { opacity:1; transform: translateY(0);    }
                         to   { opacity:0; transform: translateY(-12px);} }

    .step-dots {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 30px;
    }
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(155,135,245,0.18); transition: background .3s, transform .3s;
    }
    .step-dot.on { background: var(--primary); transform: scale(1.4); }

    .step-q {
      font-size: 20px; font-weight: 700; text-align: center;
      line-height: 1.65; margin-bottom: 28px; color: var(--text); letter-spacing: -.01em;
    }

    .ic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    .ic-card {
      background: rgba(155,135,245,0.05); border: 1px solid rgba(155,135,245,0.13);
      border-radius: 18px; padding: 22px 12px 18px;
      text-align: center; cursor: pointer; user-select: none;
      transition: background .16s, border-color .16s, transform .14s;
    }
    .ic-card:hover  { background: rgba(155,135,245,0.1); border-color: rgba(155,135,245,0.3); }
    .ic-card:active { transform: scale(.95); }
    .ic-card.picked { background: rgba(155,135,245,0.2); border-color: var(--primary);
                      animation: cardPick .22s ease; }
    @keyframes cardPick { 0%{transform:scale(1)} 50%{transform:scale(.94)} 100%{transform:scale(.97)} }
    .ic-icon  { font-size: 30px; display: block; margin-bottom: 9px; }
    .ic-label { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; }

    .star-flow { display: flex; justify-content: center; gap: 16px; padding: 8px 0 6px; }
    .sf-star {
      font-size: 40px; cursor: pointer; opacity: .18; line-height: 1;
      transition: opacity .14s, transform .14s, filter .14s;
    }
    .sf-star:hover { opacity: .6; }
    .sf-star.lit   { opacity: 1; filter: drop-shadow(0 0 9px rgba(255,210,60,.85)); }
    .sf-star:active { transform: scale(.84); }
    .star-hint {
      text-align: center; font-size: 13px; color: var(--text-dim);
      margin-top: 14px; min-height: 20px; transition: opacity .25s;
    }

    .impact-final { display: none; text-align: center; padding: 16px 0 4px; }
    .impact-final.active { display: block; animation: stepIn .55s ease both; }
    .final-glyph {
      font-size: 52px; display: block; margin-bottom: 22px;
      animation: glowPulse 2.8s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { filter: drop-shadow(0 0 14px rgba(155,135,245,.55)); }
      50%      { filter: drop-shadow(0 0 26px rgba(155,135,245,1)); }
    }
    .final-l1 {
      font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px;
      opacity: 0; animation: fadeUp .5s .25s ease both;
    }
    .final-l2 {
      font-size: 14px; color: var(--text-dim); line-height: 1.7;
      opacity: 0; animation: fadeUp .5s .55s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(9px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<div class="hdr">
  <span class="hdr-logo">하루하루의 기적 ✦</span>
  <span class="hdr-meta" id="hdr-meta"></span>
</div>

<div class="page">
  <div id="loading" class="loading">이야기를 불러오는 중</div>
  <div id="content" style="display:none">
    <div class="hero" id="hero"></div>
    <div class="slides" id="slides"></div>
    <!-- Impact Flow -->
    <div class="impact-flow" id="impact-flow">

      <div class="step-dots" id="step-dots">
        <div class="step-dot on"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <!-- Step 1: Emotion -->
      <div class="impact-step active" id="impact-step-1">
        <div class="step-q">이 이야기가<br>어떤 마음을 주었나요</div>
        <div class="ic-grid">
          <div class="ic-card" onclick="pickEmotion('moved',this)">
            <span class="ic-icon">🌊</span><span class="ic-label">감동받았어요</span>
          </div>
          <div class="ic-card" onclick="pickEmotion('resonated',this)">
            <span class="ic-icon">✦</span><span class="ic-label">공명했어요</span>
          </div>
          <div class="ic-card" onclick="pickEmotion('encouraged',this)">
            <span class="ic-icon">🌿</span><span class="ic-label">용기를 얻었어요</span>
          </div>
          <div class="ic-card" onclick="pickEmotion('reflective',this)">
            <span class="ic-icon">🌙</span><span class="ic-label">돌아보게 됐어요</span>
          </div>
          <div class="ic-card" style="grid-column:span 2" onclick="pickEmotion('calm',this)">
            <span class="ic-icon">🫧</span><span class="ic-label">차분해졌어요</span>
          </div>
        </div>
      </div>

      <!-- Step 2: Action -->
      <div class="impact-step" id="impact-step-2">
        <div class="step-q">이 이야기를 보고<br>어떻게 하시겠어요</div>
        <div class="ic-grid">
          <div class="ic-card" onclick="pickAction('create_star',this)">
            <span class="ic-icon">✨</span><span class="ic-label">나도 별<br>만들게요</span>
          </div>
          <div class="ic-card" onclick="pickAction('share',this)">
            <span class="ic-icon">🌐</span><span class="ic-label">이야기<br>나눌게요</span>
          </div>
          <div class="ic-card" onclick="pickAction('reflect',this)">
            <span class="ic-icon">🌿</span><span class="ic-label">오늘을<br>돌아볼게요</span>
          </div>
          <div class="ic-card" onclick="pickAction('just_felt',this)">
            <span class="ic-icon">🌊</span><span class="ic-label">그냥<br>느꼈어요</span>
          </div>
        </div>
      </div>

      <!-- Step 3: Level -->
      <div class="impact-step" id="impact-step-3">
        <div class="step-q">얼마나 깊이<br>닿았나요</div>
        <div class="star-flow" id="impact-stars">
          <span class="sf-star" onmouseenter="previewLevel(1)" onmouseleave="clearPreview()" onclick="pickLevel(1)">★</span>
          <span class="sf-star" onmouseenter="previewLevel(2)" onmouseleave="clearPreview()" onclick="pickLevel(2)">★</span>
          <span class="sf-star" onmouseenter="previewLevel(3)" onmouseleave="clearPreview()" onclick="pickLevel(3)">★</span>
          <span class="sf-star" onmouseenter="previewLevel(4)" onmouseleave="clearPreview()" onclick="pickLevel(4)">★</span>
          <span class="sf-star" onmouseenter="previewLevel(5)" onmouseleave="clearPreview()" onclick="pickLevel(5)">★</span>
        </div>
        <div class="star-hint" id="star-hint"> </div>
      </div>

      <!-- Final -->
      <div class="impact-final" id="impact-final">
        <span class="final-glyph">✦</span>
        <div class="final-l1" id="final-l1"></div>
        <div class="final-l2" id="final-l2"></div>
      </div>

    </div>

    <div class="cta-wrap">
      <p class="cta-text">당신만의 별 이야기를<br>지금 시작해보세요</p>
      <a class="cta-btn" id="cta-link" href="/star-entry.html">나의 별 만들기 →</a>
      <div style="margin-top:18px;">
        <button class="cta-btn" id="share-btn"
          style="background:transparent; border:1px solid var(--primary); color:var(--primary); width:100%; margin-top:0;"
          onclick="shareStorybook()">이 이야기 공유하기 ✦</button>
      </div>
    </div>
  </div>
  <div id="error" class="error" style="display:none">이야기를 찾을 수 없어요 🌙</div>
</div>

<script>
const STORYBOOK_ID = window.location.pathname.split('/').pop();
const URL_PARAMS   = new URLSearchParams(window.location.search);
const REF_KEY      = URL_PARAMS.get('ref') || null;

const EM_KO  = { confusion:'혼란', calm:'고요', fragile_hope:'희망', curiosity:'호기심', pause:'멈춤' };
const LOC_KO = { cablecar:'케이블카', cafe:'카페', hamel:'하멜', stay:'숙소' };
const LOC_IC = { cablecar:'🚡', cafe:'☕', hamel:'⚓', stay:'🏠' };

// impact 상태
let _impactStorybookId = null;
let _impactJourneyId   = null;
let _impactAccessKey   = null;
let _impactEmotion     = null;
let _impactAction      = null;
let _impactLevel       = null;

// 방문 기록 (non-blocking)
fetch('/api/storybook/view', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ share_key: STORYBOOK_ID, ref_access_key: REF_KEY }),
}).catch(() => {});

async function load() {
  try {
    const res  = await fetch(`/api/storybook/s/${STORYBOOK_ID}`);
    const data = await res.json();
    if (!data.success) throw new Error('not found');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';

    // impact 추적용 저장
    _impactStorybookId = data.id   || null;
    _impactJourneyId   = data.journey_id || null;
    _impactAccessKey   = data.access_key || null;

    const meta = data.meta || {};

    // header meta
    document.getElementById('hdr-meta').textContent =
      `${meta.card_count || ''}개 카드 · ${meta.flow_type === 'full' ? 'full' : 'compact'}`;

    // hero
    document.getElementById('hero').innerHTML = `
      <div class="hero-emotion">✦</div>
      <div class="hero-title">나의 여수 이야기</div>
      <div class="hero-sub">${EM_KO[meta.first_emotion]||''} → ${EM_KO[meta.last_emotion]||''}</div>`;

    // CTA ref link — ref + from_storybook 추가
    const ctaParams = new URLSearchParams();
    if (data.access_key) ctaParams.set('ref', data.access_key);
    if (data.share_key)  ctaParams.set('from_storybook', data.share_key);
    else if (STORYBOOK_ID) ctaParams.set('from_storybook', STORYBOOK_ID);
    document.getElementById('cta-link').href =
      `/star-entry.html?${ctaParams.toString()}`;

    // slides
    const slides = data.storybook || [];
    document.getElementById('slides').innerHTML = slides.map(s => renderSlide(s)).join('');

    // CTA 노출 시 impact-flow 자동 reveal
    const ctaEl = document.querySelector('.cta-wrap');
    if (ctaEl) {
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          obs.disconnect();
          document.getElementById('impact-flow').classList.add('revealed');
        }
      }, { threshold: 0.5 });
      obs.observe(ctaEl);
    }
  } catch (_) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = '';
  }
}

function renderSlide(s) {
  if (s.type === 'text') {
    return `<div class="slide-text"><p>${escHtml(s.content)}</p></div>`;
  }
  if (s.role === 'main_star') {
    const imgHtml = s.image_url
      ? `<img src="${escHtml(s.image_url)}" alt="별" onerror="this.parentElement.innerHTML=mainStarPh('${escHtml(s.emotion||'')}');">`
      : mainStarPh(s.emotion);
    return `<div class="slide-main-star">${imgHtml}</div>`;
  }
  // normal image slide
  const ph = `
    <div class="slide-image-ph">
      <span class="slide-loc-icon">${LOC_IC[s.location]||'⭐'}</span>
      <span class="slide-loc-name">${LOC_KO[s.location]||s.location||''}</span>
      <span class="slide-em-tag em-${s.emotion||'calm'}">${EM_KO[s.emotion]||s.emotion||''}</span>
    </div>`;
  const imgHtml = s.image_url
    ? `<img src="${escHtml(s.image_url)}" alt="${escHtml(s.location||'')}" onerror="this.parentElement.innerHTML='${ph.replace(/'/g,"\\'")}';">`
    : ph;
  return `<div class="slide-image">${imgHtml}</div>`;
}

function mainStarPh(emotion) {
  return `<div class="slide-main-star-ph"><span class="star-glow">⭐</span><p>${EM_KO[emotion]||''}</p></div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Impact Flow ────────────────────────────────────────────────
const FINAL_LINES = {
  moved:      ['파도처럼 밀려온 마음이에요', '이 별이 오래 기억할 거예요'],
  resonated:  ['같은 하늘 아래 있었네요', '우리는 이미 이어져 있어요'],
  encouraged: ['작은 용기가 별이 됐어요', '한 걸음 더 나아가도 돼요'],
  reflective: ['잠깐 멈춰 바라본 오늘이에요', '이미 충분히 살고 있어요'],
  calm:       ['고요함이 마음에 닿았어요', '이 순간을 오래 기억하세요'],
};
const STAR_HINTS = ['잠깐 스쳤어요', '조금 남았어요', '마음 깊이 닿았어요', '오래 머물렀어요', '잊을 수 없어요'];

function _goStep(n) {
  const flow = document.getElementById('impact-flow');
  const cur  = flow.querySelector('.impact-step.active');

  if (cur) {
    cur.classList.add('exit');
    setTimeout(() => { cur.classList.remove('active', 'exit'); cur.style.animation = ''; }, 300);
  }

  setTimeout(() => {
    if (n === 'final') {
      document.getElementById('step-dots').style.visibility = 'hidden';
      document.getElementById('impact-final').classList.add('active');
    } else {
      const next = document.getElementById(`impact-step-${n}`);
      if (next) next.classList.add('active');
      document.querySelectorAll('#step-dots .step-dot').forEach((d, i) => {
        d.classList.toggle('on', i < n);
      });
    }
  }, 170);
}

function pickEmotion(val, el) {
  _impactEmotion = val;
  el.classList.add('picked');
  setTimeout(() => _goStep(2), 340);
}

function pickAction(val, el) {
  _impactAction = val;
  el.classList.add('picked');
  setTimeout(() => _goStep(3), 340);
}

function previewLevel(n) {
  document.querySelectorAll('#impact-stars .sf-star').forEach((s, i) => {
    s.style.opacity = i < n ? '.75' : '';
  });
  const hint = document.getElementById('star-hint');
  if (hint) hint.textContent = STAR_HINTS[n - 1];
}

function clearPreview() {
  if (_impactLevel) return;
  document.querySelectorAll('#impact-stars .sf-star').forEach(s => { s.style.opacity = ''; });
  const hint = document.getElementById('star-hint');
  if (hint) hint.textContent = ' ';
}

function pickLevel(n) {
  _impactLevel = n;
  const stars = document.querySelectorAll('#impact-stars .sf-star');
  stars.forEach((s, i) => {
    s.style.opacity = '';
    s.classList.toggle('lit', i < n);
  });
  const hint = document.getElementById('star-hint');
  if (hint) hint.textContent = STAR_HINTS[n - 1];

  // 배경 저장 (non-blocking)
  fetch('/api/impact', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      journey_id:     _impactJourneyId,
      storybook_id:   _impactStorybookId,
      access_key:     _impactAccessKey,
      emotion_result: _impactEmotion,
      action_type:    _impactAction,
      impact_level:   n,
    }),
  }).catch(() => {});

  const lines = FINAL_LINES[_impactEmotion] || ['마음이 별에 닿았어요', '이 여정을 기억할게요'];
  document.getElementById('final-l1').textContent = lines[0];
  document.getElementById('final-l2').textContent = lines[1];
  setTimeout(() => _goStep('final'), 520);
}

function shareStorybook() {
  const shareUrl = window.location.href;
  fetch('/api/storybook/share-click', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ share_key: STORYBOOK_ID, channel: 'link' }),
  }).catch(() => {});

  if (navigator.share) {
    navigator.share({ title: '나의 여수 이야기', url: shareUrl }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const btn = document.getElementById('share-btn');
      const orig = btn.textContent;
      btn.textContent = '링크가 복사됐어요 ✓';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {
      prompt('이 링크를 복사하세요:', shareUrl);
    });
  }
}

load();
</script>
</body>
</html>
