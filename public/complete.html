<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별이 태어났어요 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }

    .star-anim {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.8; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── 감정 연결 배너 ─────────────────────────────── */
    .emotion-banner {
      margin-bottom: 24px;
      padding: 22px 24px;
      border-radius: 18px;
      text-align: center;
      animation: fadeInUp 0.6s ease both;
    }
    .emotion-banner.linked {
      background: rgba(255, 220, 100, 0.1);
      border: 1.5px solid rgba(255, 220, 100, 0.35);
      box-shadow: 0 0 24px rgba(255, 200, 80, 0.12);
    }
    .emotion-banner.no-link {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .banner-line1 {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .banner-line2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
    }
    .banner-line2.glow {
      color: #ffe899;
      text-shadow: 0 0 12px rgba(255, 220, 80, 0.5);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 접근 코드 카드 ─────────────────────────────── */
    .access-card {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .access-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    .access-key {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #a8c8ff;
    }
    .access-hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ── 공유 섹션 ──────────────────────────────────── */
    .share-area {
      margin-bottom: 16px;
    }

    .btn-kakao {
      width: 100%;
      padding: 16px;
      background: #FEE500;
      border: none;
      border-radius: 14px;
      color: #191919;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-kakao:active { opacity: 0.85; }

    .btn-copy {
      display: none;
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 8px;
    }
    .btn-copy:active { opacity: 0.7; }

    .copy-toast {
      display: none;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      animation: fadeInUp 0.3s ease both;
    }
    .share-error {
      display: none;
      margin-bottom: 10px;
      padding: 12px 16px;
      background: rgba(255, 220, 80, 0.07);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 220, 80, 0.65);
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    /* ── 케이블카 영상 모달 ─────────────────────────────── */
    .video-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .video-modal.active { display: flex; }
    .video-modal video {
      width: 100%;
      max-width: 480px;
      max-height: 100vh;
      object-fit: cover;
    }
    .video-caption {
      position: absolute;
      bottom: 88px;
      left: 0; right: 0;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 16px rgba(0,0,0,0.7);
      padding: 0 24px;
      line-height: 1.7;
      pointer-events: none;
    }
    .video-skip {
      position: absolute;
      bottom: 28px;
      left: 50%; transform: translateX(-50%);
      padding: 11px 32px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 24px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .video-skip:active { background: rgba(255,255,255,0.2); }

    /* ── 3개월 봉인 섹션 ─────────────────────────────── */
    .seal-section {
      display: none;
      margin-bottom: 20px;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,220,80,0.22);
      border-radius: 18px;
      text-align: left;
      animation: fadeInUp 0.5s ease both;
    }
    .seal-icon  { font-size: 32px; text-align: center; display: block; margin-bottom: 12px; }
    .seal-title { font-size: 18px; font-weight: 700; text-align: center; line-height: 1.5; margin-bottom: 8px; }
    .seal-sub   { font-size: 13px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.7; margin-bottom: 20px; }
    .seal-textarea-wrap {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px; padding: 4px; margin-bottom: 14px;
    }
    .seal-textarea-wrap textarea {
      width: 100%; min-height: 80px;
      background: transparent; border: none; outline: none;
      color: #fff; font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.6; padding: 12px; resize: none;
    }
    .seal-textarea-wrap textarea::placeholder { color: rgba(255,255,255,0.28); }
    .seal-count { text-align: right; font-size: 11px; color: rgba(255,255,255,0.3); padding: 0 12px 8px; }
    .btn-seal {
      width: 100%; padding: 15px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; margin-bottom: 8px;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-seal:active { opacity: 0.85; }
    .btn-seal:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-seal-skip {
      display: block; width: 100%; padding: 10px;
      background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .seal-saved {
      display: none; text-align: center;
      font-size: 14px; color: rgba(255,220,80,0.8); padding: 8px 0;
      animation: fadeInUp 0.3s ease both;
    }

    /* ── 내 별 보러가기 ─────────────────────────────── */
    .btn-view {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
    }
    .btn-view:active { opacity: 0.85; }
  </style>
</head>
<body>
  <!-- 케이블카 상승 영상 모달 -->
  <div class="video-modal" id="videoModal">
    <video id="cablecarVideo" muted playsinline preload="auto">
      <source src="/videos/cablecar-star-intro.mp4" type="video/mp4">
    </video>
    <p class="video-caption">당신의 소원이,<br>하늘로 올라가고 있어요</p>
    <button class="video-skip" id="videoSkip">건너뛰기</button>
  </div>

  <div class="container">
    <span class="star-anim">⭐</span>
    <h1>당신의 별이 기록되었습니다</h1>
    <p class="sub">
      이 코드를 저장해두면<br>
      언제든 다시 별을 만날 수 있어요
    </p>

    <div class="emotion-banner" id="emotionBanner">
      <p class="banner-line1" id="bannerLine1"></p>
      <p class="banner-line2" id="bannerLine2"></p>
    </div>

    <div class="access-card">
      <div class="access-label">내 별 접근 코드</div>
      <div class="access-key" id="accessKey">—</div>
      <div class="access-hint">화면 캡처 또는 메모해두세요</div>
    </div>

    <!-- 3개월 봉인 섹션 (케이블카 영상 종료 후 표시) -->
    <div class="seal-section" id="sealSection">
      <span class="seal-icon">🔒</span>
      <h2 class="seal-title">3개월 뒤, 이 별을<br>다시 만날게요</h2>
      <p class="seal-sub">지금의 마음을 미래의 당신에게<br>한 마디 남겨도 좋아요 (선택)</p>
      <div class="seal-textarea-wrap">
        <textarea id="sealContent" maxlength="100" placeholder="3개월 뒤의 나에게..."></textarea>
        <div class="seal-count"><span id="sealCount">0</span> / 100</div>
      </div>
      <button class="btn-seal" id="btnSeal">이 마음 봉인하기 🔒</button>
      <button class="btn-seal-skip" id="btnSealSkip">나중에 하기</button>
      <div class="seal-saved" id="sealSaved">봉인됐어요 ✨</div>
    </div>

    <!-- 공유 섹션 (봉인 이후 표시) -->
    <div id="shareSection" style="display:none">
      <div class="share-area">
        <button class="btn-kakao" id="btnKakao">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M9 0C4.037 0 0 3.223 0 7.2c0 2.57 1.648 4.825 4.127 6.108l-1.05 3.894c-.092.342.305.608.603.396l4.684-3.127A10.9 10.9 0 009 14.4c4.963 0 9-3.223 9-7.2S13.963 0 9 0z"
              fill="#191919"/>
          </svg>
          친구에게 공유하기
        </button>
        <button class="btn-copy" id="btnCopy">링크 복사</button>
        <div class="copy-toast" id="copyToast">링크가 복사됐어요 ✓</div>
        <div class="share-error" id="shareError"></div>
      </div>
      <a class="btn-view" id="btnView" href="#">내 별 보러 가기 →</a>
    </div>
  </div>

  <script>
    const KAKAO_KEY   = '8557586f56efb74719c1738c31beda97';
    const BASE_URL    = 'https://app.dailymiracles.kr';
    const EMOTION_MAP = {
      '설렘':   '괜찮아졌어요 ✨',
      '편안함': '조금 가벼워졌어요',
      '기대':   '기대가 별이 됐어요',
      '정리됨': '지금이 괜찮아요',
    };

    // ── 인증 확인 ─────────────────────────────────────
    const accessKey = localStorage.getItem('access_key');
    if (!accessKey) {
      window.location.href = '/star-entry.html';
    }

    // ── 기본 UI 세팅 ──────────────────────────────────
    document.getElementById('accessKey').textContent = accessKey;
    document.getElementById('btnView').href = '/star-view.html?key=' + accessKey;

    // ── 감정 연결 배너 ────────────────────────────────
    const banner   = document.getElementById('emotionBanner');
    const line1    = document.getElementById('bannerLine1');
    const line2    = document.getElementById('bannerLine2');
    const isLinked = localStorage.getItem('emotion_linked') === '1';

    if (isLinked) {
      banner.classList.add('linked');
      line1.textContent = '당신의 별이';
      line2.textContent = '누군가의 별과 이어졌어요 ✨';
      line2.classList.add('glow');
    } else {
      banner.classList.add('no-link');
      line1.textContent = '';
      line2.textContent = '당신의 별이 떠올랐어요 🌌';
    }
    localStorage.removeItem('emotion_linked');

    // ── Kakao SDK 초기화 (1회만) ─────────────────────
    function initKakao() {
      if (!window.Kakao) {
        console.error('[Kakao] window.Kakao 없음 — CDN 로드 실패');
        return false;
      }
      try {
        if (!window.Kakao.isInitialized()) {
          console.log('[Kakao] init 호출 | key 앞 6자:', KAKAO_KEY.slice(0, 6));
          window.Kakao.init(KAKAO_KEY);
        } else {
          console.log('[Kakao] 이미 initialized — init 스킵');
        }
        const ok = window.Kakao.isInitialized();
        console.log('[Kakao] isInitialized:', ok, '| Share 사용 가능:', !!window.Kakao?.Share);
        return ok;
      } catch (e) {
        console.warn('[Kakao] init 실패:', e.message);
        return false;
      }
    }

    // ── 공유 데이터 준비 ──────────────────────────────
    let   emotionText      = '괜찮아졌어요 ✨';
    let   imageUrl         = localStorage.getItem('share_image_url') || '';
    let   originLocation   = localStorage.getItem('origin_location') || '';

    // 친구 유입용 URL: 별 생성 입력 → 공유 추적
    function buildEntryUrl() {
      const loc = originLocation || 'direct';
      return `${BASE_URL}/star-entry.html?loc=${encodeURIComponent(loc)}&from=share&ref=${encodeURIComponent(accessKey)}`;
    }

    // 절대 URL 보정 — blob:/data:/http: 차단, 상대경로 보정
    function toAbsoluteUrl(url) {
      if (!url)                              return `${BASE_URL}/images/fallback/star-default.svg`;
      if (url.startsWith('blob:') ||
          url.startsWith('data:'))           return `${BASE_URL}/images/fallback/star-default.svg`;
      if (url.startsWith('http://'))         return url.replace('http://', 'https://');
      if (url.startsWith('https://'))        return url;
      return `${BASE_URL}${url.startsWith('/') ? url : '/' + url}`;
    }

    // star API에서 emotion + image + origin_location 보완 (fire-and-forget)
    (async () => {
      try {
        const res  = await fetch(`/api/star/${encodeURIComponent(accessKey)}`);
        const data = await res.json();
        if (data.success) {
          emotionText = EMOTION_MAP[data.star?.emotion] || emotionText;
          if (data.image_url)               imageUrl       = data.image_url;
          if (data.star?.origin_location)   originLocation = data.star.origin_location;
        }
      } catch { /* fallback 유지 */ }
    })();

    // ── 공유 실패 → fallback 노출 ─────────────────────
    function showFallback(msg) {
      const errorEl = document.getElementById('shareError');
      const copyBtn = document.getElementById('btnCopy');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      copyBtn.style.display = 'block';
    }

    // ── 카카오톡 공유 버튼 ────────────────────────────
    document.getElementById('btnKakao').addEventListener('click', () => {
      document.getElementById('shareError').style.display = 'none';

      const _entryUrl = buildEntryUrl();

      if (!initKakao() || !window.Kakao?.Share) {
        showFallback('카카오톡 공유가 열리지 않았어요.\n링크를 복사해서 보내주세요.');
        return;
      }

      try {
        const _absImage = toAbsoluteUrl(imageUrl);
        const _payload  = {
          objectType: 'feed',
          content: {
            title:       '내 소원이 별이 됐어요 ✨',
            description: '당신의 소원을, 별로 만들어보세요',
            imageUrl:    _absImage,
            link: {
              mobileWebUrl: _entryUrl,
              webUrl:       _entryUrl,
            },
          },
          buttons: [{
            title: '나도 만들어보기',
            link: {
              mobileWebUrl: _entryUrl,
              webUrl:       _entryUrl,
            },
          }],
        };
        console.log('[Kakao] sendDefault payload:', JSON.stringify(_payload, null, 2));
        window.Kakao.Share.sendDefault(_payload);
      } catch (e) {
        console.warn('[Kakao] sendDefault 실패:', e.message);
        showFallback('카카오톡 공유가 열리지 않았어요.\n링크를 복사해서 보내주세요.');
      }
    });

    // ── 케이블카 영상 모달 ─────────────────────────────────
    (function() {
      const modal = document.getElementById('videoModal');
      const video = document.getElementById('cablecarVideo');
      const skip  = document.getElementById('videoSkip');
      let   canPlay = false;

      function closeModal() {
        modal.classList.remove('active');
        video.pause();
        const sealEl = document.getElementById('sealSection');
        sealEl.style.display = 'block';
        setTimeout(() => sealEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
      }

      video.addEventListener('ended', closeModal);

      skip.addEventListener('click', () => {
        if (canPlay) {
          closeModal();
        } else {
          video.play()
            .then(() => { canPlay = true; skip.textContent = '건너뛰기'; })
            .catch(() => closeModal());
        }
      });

      setTimeout(() => {
        modal.classList.add('active');
        video.play()
          .then(() => { canPlay = true; })
          .catch(() => { skip.textContent = '영상 보기 →'; });
      }, 1500);
    })();

    // ── 3개월 봉인 ────────────────────────────────────
    (function() {
      const starId     = localStorage.getItem('star_id');
      const sealTa     = document.getElementById('sealContent');
      const sealCount  = document.getElementById('sealCount');
      const btnSeal    = document.getElementById('btnSeal');
      const btnSkip    = document.getElementById('btnSealSkip');
      const sealSaved  = document.getElementById('sealSaved');

      function revealShare() {
        document.getElementById('shareSection').style.display = 'block';
        setTimeout(() => {
          document.getElementById('btnKakao').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }

      sealTa.addEventListener('input', () => { sealCount.textContent = sealTa.value.length; });

      btnSeal.addEventListener('click', async () => {
        btnSeal.disabled = true;
        btnSeal.textContent = '봉인 중...';
        const content = sealTa.value.trim();
        if (content && starId) {
          try {
            await fetch('/api/star/promise', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({ star_id: starId, type: '3m', content }),
            });
          } catch { /* 실패해도 진행 */ }
        }
        sealSaved.style.display = 'block';
        setTimeout(() => {
          document.getElementById('sealSection').style.display = 'none';
          revealShare();
        }, 1200);
      });

      btnSkip.addEventListener('click', () => {
        document.getElementById('sealSection').style.display = 'none';
        revealShare();
      });
    })();

    // ── 링크 복사 ─────────────────────────────────────
    document.getElementById('btnCopy').addEventListener('click', async () => {
      const _entryUrl = buildEntryUrl();
      try {
        await navigator.clipboard.writeText(_entryUrl);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      } catch {
        // clipboard API 실패 시 selection 방식 fallback
        const input = document.createElement('input');
        input.value = buildEntryUrl();
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      }
    });
  </script>
</body>
</html>
