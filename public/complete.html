<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별이 태어났어요 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }

    .star-anim {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.8; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── 감정 연결 배너 ─────────────────────────────── */
    .emotion-banner {
      margin-bottom: 24px;
      padding: 22px 24px;
      border-radius: 18px;
      text-align: center;
      animation: fadeInUp 0.6s ease both;
    }
    .emotion-banner.linked {
      background: rgba(255, 220, 100, 0.1);
      border: 1.5px solid rgba(255, 220, 100, 0.35);
      box-shadow: 0 0 24px rgba(255, 200, 80, 0.12);
    }
    .emotion-banner.no-link {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .banner-line1 {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .banner-line2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
    }
    .banner-line2.glow {
      color: #ffe899;
      text-shadow: 0 0 12px rgba(255, 220, 80, 0.5);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 접근 코드 카드 ─────────────────────────────── */
    .access-card {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .access-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    .access-key {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #a8c8ff;
    }
    .access-hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ── 공유 섹션 ──────────────────────────────────── */
    .share-area {
      margin-bottom: 16px;
    }

    .btn-kakao {
      width: 100%;
      padding: 16px;
      background: #FEE500;
      border: none;
      border-radius: 14px;
      color: #191919;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-kakao:active { opacity: 0.85; }

    .btn-copy {
      display: none;
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 8px;
    }
    .btn-copy:active { opacity: 0.7; }

    .copy-toast {
      display: none;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      animation: fadeInUp 0.3s ease both;
    }
    .share-error {
      display: none;
      margin-bottom: 10px;
      padding: 12px 16px;
      background: rgba(255, 220, 80, 0.07);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 220, 80, 0.65);
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    /* ── 내 별 보러가기 ─────────────────────────────── */
    .btn-view {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
    }
    .btn-view:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <span class="star-anim">⭐</span>
    <h1>당신의 별이 기록되었습니다</h1>
    <p class="sub">
      이 코드를 저장해두면<br>
      언제든 다시 별을 만날 수 있어요
    </p>

    <div class="emotion-banner" id="emotionBanner">
      <p class="banner-line1" id="bannerLine1"></p>
      <p class="banner-line2" id="bannerLine2"></p>
    </div>

    <div class="access-card">
      <div class="access-label">내 별 접근 코드</div>
      <div class="access-key" id="accessKey">—</div>
      <div class="access-hint">화면 캡처 또는 메모해두세요</div>
    </div>

    <!-- 공유 섹션 -->
    <div class="share-area">
      <button class="btn-kakao" id="btnKakao">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M9 0C4.037 0 0 3.223 0 7.2c0 2.57 1.648 4.825 4.127 6.108l-1.05 3.894c-.092.342.305.608.603.396l4.684-3.127A10.9 10.9 0 009 14.4c4.963 0 9-3.223 9-7.2S13.963 0 9 0z"
            fill="#191919"/>
        </svg>
        카카오톡으로 전하기
      </button>

      <button class="btn-copy" id="btnCopy">링크 복사하기</button>
      <div class="copy-toast" id="copyToast">링크가 복사됐어요 ✓</div>
      <div class="share-error" id="shareError"></div>
    </div>

    <a class="btn-view" id="btnView" href="#">내 별 보러 가기 →</a>
  </div>

  <script>
    const KAKAO_KEY   = '16bc9244b957748e7453b0e8c24cc2ce';
    const BASE_URL    = 'https://app.dailymiracles.kr';
    const EMOTION_MAP = {
      '설렘':   '괜찮아졌어요 ✨',
      '편안함': '조금 가벼워졌어요',
      '기대':   '기대가 별이 됐어요',
      '정리됨': '지금이 괜찮아요',
    };

    // ── 인증 확인 ─────────────────────────────────────
    const accessKey = localStorage.getItem('access_key');
    if (!accessKey) {
      window.location.href = '/star-entry.html';
    }

    // ── 기본 UI 세팅 ──────────────────────────────────
    document.getElementById('accessKey').textContent = accessKey;
    document.getElementById('btnView').href = '/star-view.html?key=' + accessKey;

    // ── 감정 연결 배너 ────────────────────────────────
    const banner   = document.getElementById('emotionBanner');
    const line1    = document.getElementById('bannerLine1');
    const line2    = document.getElementById('bannerLine2');
    const isLinked = localStorage.getItem('emotion_linked') === '1';

    if (isLinked) {
      banner.classList.add('linked');
      line1.textContent = '당신의 별이';
      line2.textContent = '누군가의 별과 이어졌어요 ✨';
      line2.classList.add('glow');
    } else {
      banner.classList.add('no-link');
      line1.textContent = '';
      line2.textContent = '당신의 별이 떠올랐어요 🌌';
    }
    localStorage.removeItem('emotion_linked');

    // ── Kakao SDK 초기화 ──────────────────────────────
    function initKakao() {
      if (!window.Kakao) return false;
      try {
        if (!window.Kakao.isInitialized()) window.Kakao.init(KAKAO_KEY);
        return window.Kakao.isInitialized();
      } catch (e) {
        console.warn('[Kakao] init 실패:', e.message);
        return false;
      }
    }

    // ── 공유 데이터 준비 ──────────────────────────────
    const shareUrl    = `${BASE_URL}/share.html?key=${encodeURIComponent(accessKey)}`;
    let   emotionText = '괜찮아졌어요 ✨';
    let   imageUrl    = localStorage.getItem('share_image_url') || '';

    // 절대 URL 보정
    function toAbsoluteUrl(url) {
      if (!url) return `${BASE_URL}/images/fallback/star-default.svg`;
      return url.startsWith('https://') ? url : `${BASE_URL}${url}`;
    }

    // star API에서 emotion + image 보완 (fire-and-forget)
    (async () => {
      try {
        const res  = await fetch(`/api/star/${encodeURIComponent(accessKey)}`);
        const data = await res.json();
        if (data.success) {
          emotionText = EMOTION_MAP[data.star?.emotion] || emotionText;
          if (data.image_url) imageUrl = data.image_url;
        }
      } catch { /* fallback 유지 */ }
    })();

    // ── 공유 실패 → fallback 노출 ─────────────────────
    function showFallback(msg) {
      const errorEl = document.getElementById('shareError');
      const copyBtn = document.getElementById('btnCopy');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      copyBtn.style.display = 'block';
    }

    // ── 카카오톡 공유 버튼 ────────────────────────────
    document.getElementById('btnKakao').addEventListener('click', () => {
      document.getElementById('shareError').style.display = 'none';

      if (!initKakao() || !window.Kakao?.Share) {
        showFallback('카카오톡 공유가 열리지 않았어요.\n링크를 복사해서 보내주세요.');
        return;
      }

      try {
        window.Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title:       '당신의 별이 도착했어요 🌌',
            description: emotionText,
            imageUrl:    toAbsoluteUrl(imageUrl),
            link: {
              mobileWebUrl: shareUrl,
              webUrl:       shareUrl,
            },
          },
          buttons: [{
            title: '별 보러가기',
            link: {
              mobileWebUrl: shareUrl,
              webUrl:       shareUrl,
            },
          }],
        });
      } catch (e) {
        console.warn('[Kakao] sendDefault 실패:', e.message);
        showFallback('카카오톡 공유가 열리지 않았어요.\n링크를 복사해서 보내주세요.');
      }
    });

    // ── 링크 복사 ─────────────────────────────────────
    document.getElementById('btnCopy').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(shareUrl);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      } catch {
        // clipboard API 실패 시 selection 방식 fallback
        const input = document.createElement('input');
        input.value = shareUrl;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      }
    });
  </script>
</body>
</html>
