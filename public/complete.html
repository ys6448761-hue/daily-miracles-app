<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별이 태어났어요 — 하루하루의 기적</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }

    .star-anim {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.8; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── 포스트카드 이미지 ─────────────────────────── */
    .postcard-wrap {
      width: 100%; max-width: 360px;
      margin: 0 auto 24px;
      border-radius: 18px; overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }
    .postcard-wrap.visible { display: block; }
    .postcard-img {
      width: 100%; display: block;
      object-fit: cover;
    }
    .postcard-skeleton {
      width: 100%; aspect-ratio: 2/3;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; opacity: .3;
      animation: pulse 2s ease-in-out infinite;
    }
    .postcard-skeleton.hidden { display: none; }

    /* ── 감정 연결 배너 ─────────────────────────────── */
    .emotion-banner {
      margin-bottom: 24px;
      padding: 22px 24px;
      border-radius: 18px;
      text-align: center;
      animation: fadeInUp 0.6s ease both;
    }
    .emotion-banner.linked {
      background: rgba(255, 220, 100, 0.1);
      border: 1.5px solid rgba(255, 220, 100, 0.35);
      box-shadow: 0 0 24px rgba(255, 200, 80, 0.12);
    }
    .emotion-banner.no-link {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
    }
    .banner-line1 {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .banner-line2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
    }
    .banner-line2.glow {
      color: #ffe899;
      text-shadow: 0 0 12px rgba(255, 220, 80, 0.5);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 접근 코드 카드 ─────────────────────────────── */
    .access-card {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .access-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    .access-key {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #a8c8ff;
    }
    .access-hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ── 공유 섹션 ──────────────────────────────────── */
    .share-area {
      margin-bottom: 16px;
    }

    /* 1순위: 포스트카드 저장 */
    .btn-download {
      width: 100%;
      padding: 17px;
      background: linear-gradient(92deg, #4f8ef7 0%, #7b5ea7 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-download:active { opacity: 0.88; transform: scale(.98); }

    /* 2순위: 친구에게 공유 */
    .btn-kakao {
      width: 100%;
      padding: 15px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-kakao:active { opacity: 0.7; }

    .btn-copy {
      display: none;
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 8px;
    }
    .btn-copy:active { opacity: 0.7; }

    .copy-toast {
      display: none;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      animation: fadeInUp 0.3s ease both;
    }
    .share-error {
      display: none;
      margin-bottom: 10px;
      padding: 12px 16px;
      background: rgba(255, 220, 80, 0.07);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 220, 80, 0.65);
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    .save-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      text-align: center;
      margin: -4px 0 14px;
      line-height: 1.6;
    }

    /* ── 공유 연결 카운트 ───────────────────────────────── */
    .connection-count {
      display: none;
      margin-bottom: 16px;
      padding: 16px 20px;
      background: rgba(100, 160, 255, 0.07);
      border: 1px solid rgba(100, 160, 255, 0.18);
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(200, 220, 255, 0.85);
      text-align: center;
      line-height: 1.6;
      animation: fadeInUp 0.5s ease both;
    }
    .connection-count.visible { display: block; }

    /* ── 케이블카 영상 모달 ─────────────────────────────── */
    .video-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .video-modal.active { display: flex; }
    .video-modal video {
      width: 100%;
      max-width: 480px;
      max-height: 100vh;
      object-fit: cover;
    }
    .video-caption {
      position: absolute;
      bottom: 88px;
      left: 0; right: 0;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 16px rgba(0,0,0,0.7);
      padding: 0 24px;
      line-height: 1.7;
      pointer-events: none;
    }
    .video-skip {
      position: absolute;
      bottom: 28px;
      left: 50%; transform: translateX(-50%);
      padding: 11px 32px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 24px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .video-skip:active { background: rgba(255,255,255,0.2); }

    /* ── 포스트카드 감정문구 오버레이 ─────────────────────── */
    #postcardSentenceOverlay {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 20px 18px;
      background: linear-gradient(transparent, rgba(0,0,0,0.62));
      font-size: 14px;
      color: rgba(255,255,255,0.90);
      letter-spacing: 0.07em;
      text-align: center;
      pointer-events: none;
    }

    /* ── 3개월 봉인 섹션 ─────────────────────────────── */
    .seal-section {
      display: none;
      margin-bottom: 20px;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,220,80,0.22);
      border-radius: 18px;
      text-align: left;
      animation: fadeInUp 0.5s ease both;
    }
    .seal-icon  { font-size: 32px; text-align: center; display: block; margin-bottom: 12px; }
    .seal-title { font-size: 18px; font-weight: 700; text-align: center; line-height: 1.5; margin-bottom: 8px; }
    .seal-sub   { font-size: 13px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.7; margin-bottom: 20px; }
    .seal-textarea-wrap {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px; padding: 4px; margin-bottom: 14px;
    }
    .seal-textarea-wrap textarea {
      width: 100%; min-height: 80px;
      background: transparent; border: none; outline: none;
      color: #fff; font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.6; padding: 12px; resize: none;
    }
    .seal-textarea-wrap textarea::placeholder { color: rgba(255,255,255,0.28); }
    .seal-count { text-align: right; font-size: 11px; color: rgba(255,255,255,0.3); padding: 0 12px 8px; }
    .btn-seal {
      width: 100%; padding: 15px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; margin-bottom: 8px;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-seal:active { opacity: 0.85; }
    .btn-seal:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-seal-skip {
      display: block; width: 100%; padding: 10px;
      background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .seal-saved {
      display: none; text-align: center;
      font-size: 14px; color: rgba(255,220,80,0.8); padding: 8px 0;
      animation: fadeInUp 0.3s ease both;
    }

    /* ── 내 별 보러가기 ─────────────────────────────── */
    .btn-view {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #4f8ef7, #7b5ea7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.15s;
    }
    .btn-view:active { opacity: 0.85; }
  </style>
</head>
<body>
  <!-- 케이블카 상승 영상 모달 -->
  <div class="video-modal" id="videoModal">
    <video id="cablecarVideo" muted playsinline preload="auto">
      <source src="/videos/cablecar-star-intro.mp4" type="video/mp4">
    </video>
    <p class="video-caption">당신의 소원이,<br>하늘로 올라가고 있어요</p>
    <button class="video-skip" id="videoSkip">건너뛰기</button>
    <!-- 감정 여운 — 영상 종료 후 4초 (헌법 UX 5번) -->
    <div id="emotionReveal" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:10;">
      <p id="revealSentence" style="font-size:20px;color:rgba(255,255,255,0.82);letter-spacing:0.07em;line-height:1.9;text-align:center;padding:0 36px;animation:fadeInUp 0.8s ease both;">오늘의 마음도 별이 되었어요</p>
      <p style="margin-top:22px;font-size:14px;color:rgba(255,255,255,0.25);animation:fadeInUp 0.8s ease 0.4s both;">✦</p>
    </div>
  </div>

  <div class="container">
    <span class="star-anim">⭐</span>
    <h1>당신의 별이 기록되었습니다</h1>
    <p id="staticSentence" style="font-size:13px;color:rgba(255,255,255,0.38);letter-spacing:0.07em;margin-bottom:10px;">오늘의 마음도 별이 되었어요</p>
    <p class="sub">
      이 코드를 저장해두면<br>
      언제든 다시 별을 만날 수 있어요
    </p>

    <div class="postcard-wrap" id="postcardWrap">
      <div class="postcard-skeleton" id="postcardSkeleton">✨</div>
      <img class="postcard-img" id="postcardImg" alt="별 포스트카드" style="display:none">
      <div id="postcardSentenceOverlay"></div>
    </div>

    <div class="emotion-banner" id="emotionBanner">
      <p class="banner-line1" id="bannerLine1"></p>
      <p class="banner-line2" id="bannerLine2"></p>
    </div>

    <div class="connection-count" id="connectionCount"></div>

    <div class="access-card">
      <div class="access-label">내 별 접근 코드</div>
      <div class="access-key" id="accessKey">—</div>
      <div class="access-hint">화면 캡처 또는 메모해두세요</div>
    </div>

    <!-- 공유 섹션 (케이블카 영상 종료 후 표시) -->
    <div id="shareSection" style="display:none">
      <div class="share-area">
        <button class="btn-download" id="btnDownload">📥 포스트카드 저장하기</button>
        <div class="save-hint" id="saveHint">저장 후 카카오·인스타·문자로 바로 공유해보세요</div>
        <button class="btn-kakao" id="btnKakao">
          💬 친구에게 공유하기
        </button>
        <button class="btn-copy" id="btnCopy">링크 복사</button>
        <div class="copy-toast" id="copyToast">링크가 복사됐어요 ✓</div>
        <div class="share-error" id="shareError"></div>
      </div>
      <a class="btn-view" id="btnView" href="#">내 별 보러 가기 →</a>
    </div>
  </div>

  <script>
    const KAKAO_KEY   = '8557586f56efb74719c1738c31beda97';
    const BASE_URL    = 'https://app.dailymiracles.kr';
    const EMOTION_MAP = {
      '설렘':   '괜찮아졌어요 ✨',
      '편안함': '조금 가벼워졌어요',
      '기대':   '기대가 별이 됐어요',
      '정리됨': '지금이 괜찮아요',
    };

    // ── 감정 문구 SSOT (dreamtown-postcard-emotion-copy-ssot.md v1) ──
    const EMOTION_COPY = {
      위로:  ['오늘의 마음도 별이 되었어요','작은 소원 하나가 밤하늘에 남았어요','여수의 밤바다에 작은 빛이 떠올랐어요','아주 작은 마음도 빛이 될 수 있어요'],
      쉼:    ['오늘의 바람이 조용히 닿았어요','당신의 오늘도 충분히 반짝였어요','조용한 바다 위로 작은 별 하나','마음이 조금 가벼워졌다면 좋겠어요'],
      연결:  ['당신의 마음은 사라지지 않아요','조금은 믿고 싶어졌어요','여수의 밤하늘이 당신을 기억할 거예요','이 밤의 바람이 당신에게 닿기를'],
      정리:  ['오늘의 마음을 이 밤에 남겨둘게요','오늘의 소원은 바람처럼 흘러갔어요','당신의 오늘을 별빛으로 남겨둘게요','오늘도 마음속 별 하나를 만났어요'],
      용기:  ['별빛은 아주 작은 마음에서 시작돼요','당신의 소원은 아직 끝나지 않았어요','오늘의 용기를 별에 담아두었어요','작은 빛 하나가 길이 되어줄 거예요'],
    };
    const EMOTION_CATEGORY_MAP = {
      '숨이 놓였어요': '쉼', '믿고 싶어졌어요': '연결', '정리됐어요': '정리', '용기났어요': '용기',
      comfort: '쉼', hope: '연결', calm: '정리', courage: '용기', anxiety: '위로',
      '설렘': '연결', '편안함': '쉼', '기대': '연결', '정리됨': '정리',
    };
    function pickEmotionCopy(emo) {
      const list = EMOTION_COPY[EMOTION_CATEGORY_MAP[emo] || '위로'];
      return list[Math.floor(Math.random() * list.length)];
    }
    let rawEmotion = '';
    let currentSentence = pickEmotionCopy('');
    document.getElementById('staticSentence').textContent = currentSentence;
    document.getElementById('postcardSentenceOverlay').textContent = currentSentence;

    // ── FLOW 상수 (star-entry.html과 동일) ─────────────
    const FLOW = { EMOTION:1, GEM:2, WISH:3, AURUM:4, GENERATING:5, RESULT:6, PROMISE:7, ASCEND:8, SHARE:9 };

    // ── 진입 가드: ASCEND 미만이면 처음부터 ─────────────
    const accessKey = localStorage.getItem('access_key');
    const _flowStep = Number(localStorage.getItem('flow_step'));
    console.log('[complete] 진입 진단 | flow_step:', _flowStep, '| access_key:', accessKey ? accessKey.slice(0,8)+'…' : 'null', '| share_image_url:', localStorage.getItem('share_image_url'));
    if (!accessKey || _flowStep < FLOW.ASCEND) {
      console.warn('[complete] 가드 실패 — /star-entry.html 이동');
      window.location.replace('/star-entry.html');
    }

    // ── 뒤로가기 방어: complete에서 back 누르면 다시 여기로 ──
    history.pushState({ page: 'complete' }, '', '/complete.html');
    window.addEventListener('popstate', () => {
      window.location.replace('/complete.html');
    });

    // ── 기본 UI 세팅 ──────────────────────────────────
    document.getElementById('accessKey').textContent = accessKey;
    document.getElementById('btnView').href = '/star-view/' + encodeURIComponent(accessKey);

    // ── 감정 연결 배너 ────────────────────────────────
    const banner   = document.getElementById('emotionBanner');
    const line1    = document.getElementById('bannerLine1');
    const line2    = document.getElementById('bannerLine2');
    const isLinked = localStorage.getItem('emotion_linked') === '1';

    if (isLinked) {
      banner.classList.add('linked');
      line1.textContent = '당신의 별이';
      line2.textContent = '누군가의 별과 이어졌어요 ✨';
      line2.classList.add('glow');
    } else {
      banner.classList.add('no-link');
      line1.textContent = '';
      line2.textContent = '당신의 별이 떠올랐어요 🌌';
    }
    localStorage.removeItem('emotion_linked');

    // ── Kakao SDK 초기화 (1회만) ─────────────────────
    function initKakao() {
      if (!window.Kakao) {
        console.error('[Kakao] window.Kakao 없음 — CDN 로드 실패');
        return false;
      }
      try {
        if (!window.Kakao.isInitialized()) {
          console.log('[Kakao] init 호출 | key 앞 6자:', KAKAO_KEY.slice(0, 6));
          window.Kakao.init(KAKAO_KEY);
        } else {
          console.log('[Kakao] 이미 initialized — init 스킵');
        }
        const ok = window.Kakao.isInitialized();
        console.log('[Kakao] isInitialized:', ok, '| Share 사용 가능:', !!window.Kakao?.Share);
        return ok;
      } catch (e) {
        console.warn('[Kakao] init 실패:', e.message);
        return false;
      }
    }

    // ── 공유 데이터 준비 ──────────────────────────────
    let   emotionText      = '괜찮아졌어요 ✨';
    let   imageUrl         = localStorage.getItem('share_image_url') || '';
    let   originLocation   = localStorage.getItem('origin_location') || '';

    // 친구 유입용 URL: 별 생성 입력 → 공유 추적
    function buildEntryUrl() {
      const loc = originLocation || 'direct';
      return `${BASE_URL}/star-entry.html?loc=${encodeURIComponent(loc)}&from=share&ref=${encodeURIComponent(accessKey)}`;
    }

    // 절대 URL 보정 — blob:/data:/http: 차단, 상대경로 보정
    function toAbsoluteUrl(url) {
      if (!url)                              return `${BASE_URL}/images/fallback/star-default.svg`;
      if (url.startsWith('blob:') ||
          url.startsWith('data:'))           return `${BASE_URL}/images/fallback/star-default.svg`;
      if (url.startsWith('http://'))         return url.replace('http://', 'https://');
      if (url.startsWith('https://'))        return url;
      return `${BASE_URL}${url.startsWith('/') ? url : '/' + url}`;
    }

    // ── 포스트카드 이미지 표시 ────────────────────────
    function showPostcard(url) {
      if (!url || url.startsWith('blob:') || url.startsWith('data:')) return;
      const wrap = document.getElementById('postcardWrap');
      const skel = document.getElementById('postcardSkeleton');
      const img  = document.getElementById('postcardImg');
      wrap.classList.add('visible');
      img.onload  = () => {
        skel.classList.add('hidden');
        img.style.display = 'block';
        const ov = document.getElementById('postcardSentenceOverlay');
        ov.textContent = currentSentence;
        ov.style.display = 'block';
      };
      img.onerror = () => { skel.classList.add('hidden'); };
      img.src = url;
    }

    // localStorage에 있으면 즉시 표시
    if (imageUrl) showPostcard(imageUrl);

    // star API에서 emotion + image + origin_location 보완 (fire-and-forget)
    (async () => {
      try {
        const res  = await fetch(`/api/star/${encodeURIComponent(accessKey)}`);
        const data = await res.json();
        if (data.success) {
          emotionText = EMOTION_MAP[data.star?.emotion] || emotionText;
          if (data.star?.emotion) {
            rawEmotion = data.star.emotion;
            currentSentence = pickEmotionCopy(rawEmotion);
            document.getElementById('staticSentence').textContent = currentSentence;
            document.getElementById('postcardSentenceOverlay').textContent = currentSentence;
          }
          if (data.image_url) {
            imageUrl = data.image_url;
            showPostcard(imageUrl);
          }
          if (data.star?.origin_location)   originLocation = data.star.origin_location;
        }
      } catch { /* fallback 유지 */ }
    })();

    // ── 공유 연결 추적 (이 별에서 유입된 별 개수) ─────────
    (async () => {
      try {
        const res  = await fetch(`/api/star/connections/${encodeURIComponent(accessKey)}`);
        const data = await res.json();
        if (data.success && data.count > 0) {
          const el = document.getElementById('connectionCount');
          el.textContent = `당신의 별은 ${data.count}개의 마음과 이어졌어요`;
          el.classList.add('visible');
        }
      } catch { /* 조용히 실패 */ }
    })();

    // ── 공유 실패 → fallback 노출 ─────────────────────
    function showFallback(msg) {
      const errorEl = document.getElementById('shareError');
      const copyBtn = document.getElementById('btnCopy');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      copyBtn.style.display = 'block';
    }

    // ── 이미지 파일 가져오기 (navigator.share files 용) ──
    async function fetchImageFile(url) {
      const absUrl = toAbsoluteUrl(url);
      const res    = await fetch(absUrl);
      if (!res.ok) throw new Error('fetch failed');
      const blob = await res.blob();
      const ext  = (blob.type === 'image/jpeg') ? 'jpg' : 'png';
      return new File([blob], `my-star.${ext}`, { type: blob.type });
    }

    // ── 카카오톡 공유 버튼 ────────────────────────────
    document.getElementById('btnKakao').addEventListener('click', async () => {
      document.getElementById('shareError').style.display = 'none';

      const _entryUrl = buildEntryUrl();
      const _viewUrl  = accessKey
        ? (BASE_URL + '/star-view/' + encodeURIComponent(accessKey))
        : _entryUrl;

      // ① Kakao SDK 우선 — 친구/채팅방 선택 공유 UI
      if (initKakao() && window.Kakao?.Share) {
        try {
          const _absImage = toAbsoluteUrl(imageUrl);
          const _payload  = {
            objectType: 'feed',
            content: {
              title:       '내 소원이 별이 됐어요 ✨',
              description: currentSentence,
              imageUrl:    _absImage,
              link: {
                mobileWebUrl: _entryUrl,
                webUrl:       _entryUrl,
              },
            },
            buttons: [{
              title: '나도 만들어보기',
              link: {
                mobileWebUrl: _entryUrl,
                webUrl:       _entryUrl,
              },
            }],
          };
          console.log('[Kakao] sendDefault payload:', JSON.stringify(_payload, null, 2));
          window.Kakao.Share.sendDefault(_payload);
          return;
        } catch (e) {
          console.warn('[Kakao] sendDefault 실패:', e.message);
        }
      }

      // ② navigator.share 폴백 (Kakao SDK 미가용 환경)
      if (navigator.share) {
        try {
          await navigator.share({
            title: '나의 별 포스트카드',
            text:  currentSentence,
            url:   _viewUrl,
          });
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
          console.warn('[share] navigator.share 실패:', e.message);
        }
      }

      // ③ 최종 fallback
      showFallback('공유창이 열리지 않았어요.\n이미지를 저장하거나 링크를 복사해서 보내주세요.');
    });

    // ── 이미지 다운로드 버튼 (canvas composite — 감정문구 포함) ──
    document.getElementById('btnDownload').addEventListener('click', async () => {
      if (!imageUrl) return;
      const absUrl = toAbsoluteUrl(imageUrl);
      try {
        const blob = await new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            const canvas  = document.createElement('canvas');
            canvas.width  = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            // 하단 그라디언트
            const gh   = Math.round(canvas.height * 0.24);
            const grad = ctx.createLinearGradient(0, canvas.height - gh, 0, canvas.height);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.62)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, canvas.height - gh, canvas.width, gh);
            // 감정문구 텍스트
            const fs = Math.max(22, Math.round(canvas.width * 0.042));
            ctx.font          = `${fs}px 'Noto Sans KR', sans-serif`;
            ctx.fillStyle     = 'rgba(255,255,255,0.92)';
            ctx.textAlign     = 'center';
            ctx.textBaseline  = 'bottom';
            ctx.fillText(currentSentence, canvas.width / 2, canvas.height - Math.round(fs * 0.65));
            canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob null')), 'image/jpeg', 0.92);
          };
          img.onerror = reject;
          img.src = absUrl;
        });
        const a = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'my-star.jpg';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      } catch (e) {
        console.warn('[download] canvas 실패, 원본 다운로드:', e.message);
        try {
          const file = await fetchImageFile(imageUrl);
          const a = document.createElement('a');
          a.href = URL.createObjectURL(file);
          a.download = file.name;
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        } catch {
          window.open(absUrl, '_blank');
        }
      }
    });

    // ── 케이블카 영상 모달 ─────────────────────────────────
    (function() {
      const modal = document.getElementById('videoModal');
      const video = document.getElementById('cablecarVideo');
      const skip  = document.getElementById('videoSkip');
      let   canPlay = false;

      function closeModal() {
        // 1. 영상 페이드 아웃 + 자막·건너뛰기 숨김
        video.style.transition = 'opacity 0.8s';
        video.style.opacity = '0';
        document.querySelector('.video-caption').style.visibility = 'hidden';
        skip.style.display = 'none';
        // 2. 감정 여운 문장 노출
        const revealEl = document.getElementById('emotionReveal');
        document.getElementById('revealSentence').textContent = currentSentence;
        revealEl.style.display = 'flex';
        // 3. 4초 후 모달 닫고 공유 섹션 표시
        setTimeout(() => {
          modal.classList.remove('active');
          video.pause();
          video.style.opacity = '';
          video.style.transition = '';
          document.querySelector('.video-caption').style.visibility = '';
          localStorage.setItem('flow_step', FLOW.SHARE);
          const shareEl = document.getElementById('shareSection');
          shareEl.style.display = 'block';
          setTimeout(() => shareEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
        }, 4000);
      }

      video.addEventListener('ended', closeModal);

      skip.addEventListener('click', () => {
        if (canPlay) {
          closeModal();
        } else {
          video.play()
            .then(() => { canPlay = true; skip.textContent = '건너뛰기'; })
            .catch(() => closeModal());
        }
      });

      setTimeout(() => {
        modal.classList.add('active');
        video.play()
          .then(() => { canPlay = true; })
          .catch(() => { skip.textContent = '영상 보기 →'; });
      }, 1500);
    })();

    // ── 링크 복사 ─────────────────────────────────────
    document.getElementById('btnCopy').addEventListener('click', async () => {
      const _entryUrl = buildEntryUrl();
      try {
        await navigator.clipboard.writeText(_entryUrl);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      } catch {
        // clipboard API 실패 시 selection 방식 fallback
        const input = document.createElement('input');
        input.value = buildEntryUrl();
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        const toast = document.getElementById('copyToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2200);
      }
    });
  </script>
</body>
</html>
