name: Experiment CI Gate

on:
  pull_request:
    paths:
      - 'experiments/**'
      - 'scripts/evaluate-experiment*'
      - 'scripts/health*'
      - 'scripts/lib/experiment-types*'
      - 'scripts/lib/stats*'
      - 'scripts/lib/registry*'

permissions:
  contents: read

jobs:
  experiment-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run CI policy gate
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: npx tsx scripts/ci-policy.ts --pr
